kind: palette
id: radix-yellow
version: 1.0.0
name: Radix Yellow
description: >
  Radix UI's yellow scale — 12 semantically labeled steps published in
  both light and dark variants. A bright pure yellow. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, warm, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Yellow is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: yellow-1-light
    name: Yellow 1 (light)
    value: "#FDFDF9"
    description: App background.
  - id: yellow-2-light
    name: Yellow 2 (light)
    value: "#FEFCE9"
    description: Subtle background.
  - id: yellow-3-light
    name: Yellow 3 (light)
    value: "#FFFAB8"
    description: UI element background.
  - id: yellow-4-light
    name: Yellow 4 (light)
    value: "#FFF394"
    description: Hovered UI element background.
  - id: yellow-5-light
    name: Yellow 5 (light)
    value: "#FFE770"
    description: Active / selected UI element background.
  - id: yellow-6-light
    name: Yellow 6 (light)
    value: "#F3D768"
    description: Subtle borders and separators.
  - id: yellow-7-light
    name: Yellow 7 (light)
    value: "#E4C767"
    description: UI element border and focus rings.
  - id: yellow-8-light
    name: Yellow 8 (light)
    value: "#D5AE39"
    description: Hovered UI element border.
  - id: yellow-9-light
    name: Yellow 9 (light)
    value: "#FFE629"
    description: Solid background — the brand color step.
  - id: yellow-10-light
    name: Yellow 10 (light)
    value: "#FFDC00"
    description: Hovered solid background.
  - id: yellow-11-light
    name: Yellow 11 (light)
    value: "#9E6C00"
    description: Low-contrast text.
  - id: yellow-12-light
    name: Yellow 12 (light)
    value: "#473B1F"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: yellow-1-dark
    name: Yellow 1 (dark)
    value: "#14120B"
    description: App background.
  - id: yellow-2-dark
    name: Yellow 2 (dark)
    value: "#1B180F"
    description: Subtle background.
  - id: yellow-3-dark
    name: Yellow 3 (dark)
    value: "#2D2305"
    description: UI element background.
  - id: yellow-4-dark
    name: Yellow 4 (dark)
    value: "#362B00"
    description: Hovered UI element background.
  - id: yellow-5-dark
    name: Yellow 5 (dark)
    value: "#433500"
    description: Active / selected UI element background.
  - id: yellow-6-dark
    name: Yellow 6 (dark)
    value: "#524202"
    description: Subtle borders and separators.
  - id: yellow-7-dark
    name: Yellow 7 (dark)
    value: "#665417"
    description: UI element border and focus rings.
  - id: yellow-8-dark
    name: Yellow 8 (dark)
    value: "#836A21"
    description: Hovered UI element border.
  - id: yellow-9-dark
    name: Yellow 9 (dark)
    value: "#FFE629"
    description: Solid background — the brand color step.
  - id: yellow-10-dark
    name: Yellow 10 (dark)
    value: "#FFFF57"
    description: Hovered solid background.
  - id: yellow-11-dark
    name: Yellow 11 (dark)
    value: "#F5E147"
    description: Low-contrast text.
  - id: yellow-12-dark
    name: Yellow 12 (dark)
    value: "#F6EEB4"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: yellow-1-light
      surface: yellow-2-light
      surface-elevated: yellow-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: yellow-9-light
      primary: yellow-9-light
      primary-hover: yellow-10-light
      accent: yellow-8-light
      accent-hover: yellow-7-light
      warning: yellow-9-light
      warning-hover: yellow-10-light
      error: yellow-12-light
      success: yellow-9-light
  dark:
    roles:
      background: yellow-1-dark
      surface: yellow-2-dark
      surface-elevated: yellow-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: yellow-9-dark
      primary: yellow-9-dark
      primary-hover: yellow-10-dark
      accent: yellow-8-dark
      accent-hover: yellow-7-dark
      warning: yellow-9-dark
      warning-hover: yellow-10-dark
      error: yellow-12-dark
      success: yellow-9-dark
