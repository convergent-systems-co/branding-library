kind: palette
id: tailwind-orange
version: 1.0.0
name: Tailwind Orange
description: >
  Tailwind CSS's orange hue family — 11 stops from 50 (lightest) to
  950 (darkest), forming a warm orange chromatic scale. Use directly as a brand
  palette or pair with an accent hue from another tailwind-* atom.
tags: [tailwind, warm, chromatic]

provenance:
  source: https://tailwindcss.com/docs/colors
  license: MIT
  attribution: >
    Tailwind CSS colors, Copyright Tailwind Labs Inc., MIT licensed.
    Hex values derived from canonical OKLCH definitions in
    packages/tailwindcss/theme.css via the W3C CSS Color Module Level 4
    OKLCH → sRGB conversion.
  importedDate: 2026-05-17
  importedFromVersion: "4.3.0"

swatches:
  - id: orange-50
    name: Orange 50
    value: "#FFF7ED"
    description: Lightest stop — page background in light mode.
  - id: orange-100
    name: Orange 100
    value: "#FFEDD4"
    description: Very light surface — cards and panels on light background.
  - id: orange-200
    name: Orange 200
    value: "#FFD6A7"
    description: Light divider, hairline, or subtle fill.
  - id: orange-300
    name: Orange 300
    value: "#FFB86A"
    description: Muted accent or disabled-state foreground in light mode.
  - id: orange-400
    name: Orange 400
    value: "#FF8904"
    description: Mid-light tint — soft accent, hover wash, decorative fill.
  - id: orange-500
    name: Orange 500
    value: "#FF6900"
    description: Mid stop — the canonical brand hue for chromatic palettes.
  - id: orange-600
    name: Orange 600
    value: "#F54900"
    description: Mid-dark stop — primary action in light mode for chromatic palettes.
  - id: orange-700
    name: Orange 700
    value: "#CA3500"
    description: Dark stop — pressed states, deeper emphasis.
  - id: orange-800
    name: Orange 800
    value: "#9F2D00"
    description: Very dark stop — heavy emphasis, secondary text on light.
  - id: orange-900
    name: Orange 900
    value: "#7E2A0C"
    description: Near-darkest stop — body text on light, surface on dark.
  - id: orange-950
    name: Orange 950
    value: "#441306"
    description: Darkest stop — page background in dark mode.
  - id: pure-white
    name: Pure White
    value: "#FFFFFF"
    description: Maximum-elevation surface and high-contrast text in dark mode.
  - id: pure-black
    name: Pure Black
    value: "#000000"
    description: High-contrast text on light chromatic hues where the deepest stop reads as the hue, not black.

modes:
  light:
    roles:
      background: orange-50
      surface: orange-100
      surface-elevated: pure-white
      text-primary: pure-black
      text-secondary: orange-800
      text-tertiary: orange-600
      primary: orange-500
      primary-hover: orange-600
      accent: orange-700
      accent-hover: orange-600
      warning: orange-300
      warning-hover: orange-400
      error: orange-700
      success: orange-600
  dark:
    roles:
      background: orange-950
      surface: orange-900
      surface-elevated: orange-800
      text-primary: pure-white
      text-secondary: orange-200
      text-tertiary: orange-400
      primary: orange-400
      primary-hover: orange-300
      accent: orange-300
      accent-hover: orange-200
      warning: orange-600
      warning-hover: orange-500
      error: orange-300
      success: orange-400
