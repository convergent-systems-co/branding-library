kind: palette
id: bootstrap
version: 1.0.0
name: Bootstrap 5.3
description: >
  The Bootstrap 5.3 color system — gray-100..900 plus ten named accents
  (blue, indigo, purple, pink, red, orange, yellow, green, teal, cyan)
  and the eight theme colors (primary, secondary, success, info, warning,
  danger, light, dark). Includes the full set of derived per-theme
  emphasis/bg-subtle/border-subtle values for both light and dark modes.

  Light mode is the default theme that ships when you load `bootstrap.css`;
  dark mode is activated by setting `data-bs-theme="dark"` on the root and
  overrides body bg, body color, secondary/tertiary surfaces, link color,
  and every theme-color emphasis triplet.

tags: [design-system, bootstrap, twbs, role-based]

provenance:
  source: https://github.com/twbs/bootstrap/blob/main/scss/_variables.scss
  license: MIT
  attribution: >
    Bootstrap, Copyright (c) 2011-2025 The Bootstrap Authors, licensed
    under MIT. Light theme values from scss/_variables.scss; dark theme
    overrides from scss/_variables-dark.scss. Hex values cross-checked
    against the compiled dist/css/bootstrap.css.
  importedDate: 2026-05-17
  importedFromVersion: bootstrap@5.3.8

