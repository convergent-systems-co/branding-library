kind: palette
id: tailwind-amber
version: 1.0.0
name: Tailwind Amber
description: >
  Tailwind CSS's amber hue family — 11 stops from 50 (lightest) to
  950 (darkest), forming a warm amber/gold chromatic scale. Use directly as a brand
  palette or pair with an accent hue from another tailwind-* atom.
tags: [tailwind, warm, chromatic, gold]

provenance:
  source: https://tailwindcss.com/docs/colors
  license: MIT
  attribution: >
    Tailwind CSS colors, Copyright Tailwind Labs Inc., MIT licensed.
    Hex values derived from canonical OKLCH definitions in
    packages/tailwindcss/theme.css via the W3C CSS Color Module Level 4
    OKLCH → sRGB conversion.
  importedDate: 2026-05-17
  importedFromVersion: "4.3.0"

swatches:
  - id: amber-50
    name: Amber 50
    value: "#FFFBEB"
    description: Lightest stop — page background in light mode.
  - id: amber-100
    name: Amber 100
    value: "#FEF3C6"
    description: Very light surface — cards and panels on light background.
  - id: amber-200
    name: Amber 200
    value: "#FEE685"
    description: Light divider, hairline, or subtle fill.
  - id: amber-300
    name: Amber 300
    value: "#FFD230"
    description: Muted accent or disabled-state foreground in light mode.
  - id: amber-400
    name: Amber 400
    value: "#FFB900"
    description: Mid-light tint — soft accent, hover wash, decorative fill.
  - id: amber-500
    name: Amber 500
    value: "#FE9A00"
    description: Mid stop — the canonical brand hue for chromatic palettes.
  - id: amber-600
    name: Amber 600
    value: "#E17100"
    description: Mid-dark stop — primary action in light mode for chromatic palettes.
  - id: amber-700
    name: Amber 700
    value: "#BB4D00"
    description: Dark stop — pressed states, deeper emphasis.
  - id: amber-800
    name: Amber 800
    value: "#973C00"
    description: Very dark stop — heavy emphasis, secondary text on light.
  - id: amber-900
    name: Amber 900
    value: "#7B3306"
    description: Near-darkest stop — body text on light, surface on dark.
  - id: amber-950
    name: Amber 950
    value: "#461901"
    description: Darkest stop — page background in dark mode.
  - id: pure-white
    name: Pure White
    value: "#FFFFFF"
    description: Maximum-elevation surface and high-contrast text in dark mode.
  - id: pure-black
    name: Pure Black
    value: "#000000"
    description: High-contrast text on light chromatic hues where the deepest stop reads as the hue, not black.

modes:
  light:
    roles:
      background: amber-50
      surface: amber-100
      surface-elevated: pure-white
      text-primary: pure-black
      text-secondary: amber-800
      text-tertiary: amber-600
      primary: amber-500
      primary-hover: amber-600
      accent: amber-700
      accent-hover: amber-600
      warning: amber-300
      warning-hover: amber-400
      error: amber-700
      success: amber-600
  dark:
    roles:
      background: amber-950
      surface: amber-900
      surface-elevated: amber-800
      text-primary: pure-white
      text-secondary: amber-200
      text-tertiary: amber-400
      primary: amber-400
      primary-hover: amber-300
      accent: amber-300
      accent-hover: amber-200
      warning: amber-600
      warning-hover: amber-500
      error: amber-300
      success: amber-400
