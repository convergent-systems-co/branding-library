  # ─── Vercel functional hues (Geist ds-blue/red/amber/green) ─────
  - id: vercel-blue
    name: Vercel Blue
    value: "#0070F3"
    description: ds-blue-600 — the classic Vercel link / accent blue.
  - id: vercel-blue-bright
    name: Vercel Blue Bright
    value: "#52A8FF"
