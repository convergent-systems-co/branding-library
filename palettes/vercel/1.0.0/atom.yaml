  # ─── Light-mode neutral scale (Geist ds-gray light) ─────────────
  - id: light-bg-100
    name: Light Background 100
    value: "#FFFFFF"
    description: Page canvas in light mode.
  - id: light-bg-200
    name: Light Background 200
    value: "#FAFAFA"
    description: Subtle layered surface.
  - id: light-gray-200
