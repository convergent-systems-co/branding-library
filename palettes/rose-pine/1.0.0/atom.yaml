kind: palette
id: rose-pine
version: 1.0.0
name: Rosé Pine
description: >
  All natural pine, faux fur, and a bit of soho vibes for the classy
  minimalist. Two flavors ship upstream — Main (dark) and Dawn (light)
  — sharing the same role taxonomy (base, surface, overlay, muted,
  subtle, text plus six accents: love, gold, rose, pine, foam, iris).

  Dark mode is sourced from the Main flavor; light mode is sourced
  from the Dawn flavor. Both are official upstream variants.
tags: [rose-pine, editor, dual-mode, warm, minimalist]

provenance:
  source: https://github.com/rose-pine/palette/blob/main/palette.json
  license: MIT
  attribution: Rosé Pine theme — github.com/rose-pine/rose-pine-theme
  importedDate: 2026-05-17
  notes: >
    Hex values from the canonical Rosé Pine palette JSON. Main and Dawn
    flavors map identical role names to flavor-specific hex; this atom
    flattens both into a single swatch list with a flavor prefix.

