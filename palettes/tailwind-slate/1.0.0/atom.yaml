kind: palette
id: tailwind-slate
version: 1.0.0
name: Tailwind Slate
description: >
  Tailwind CSS's slate hue family — 11 stops from 50 (lightest) to
  950 (darkest), forming a neutral gray-blue scale. Use directly as a brand
  palette or pair with an accent hue from another tailwind-* atom.
tags: [tailwind, neutral, cool]

provenance:
  source: https://tailwindcss.com/docs/colors
  license: MIT
  attribution: >
    Tailwind CSS colors, Copyright Tailwind Labs Inc., MIT licensed.
    Hex values derived from canonical OKLCH definitions in
    packages/tailwindcss/theme.css via the W3C CSS Color Module Level 4
    OKLCH → sRGB conversion.
  importedDate: 2026-05-17
  importedFromVersion: "4.3.0"

swatches:
  - id: slate-50
    name: Slate 50
    value: "#F8FAFC"
    description: Lightest stop — page background in light mode.
  - id: slate-100
    name: Slate 100
    value: "#F1F5F9"
    description: Very light surface — cards and panels on light background.
  - id: slate-200
    name: Slate 200
    value: "#E2E8F0"
    description: Light divider, hairline, or subtle fill.
  - id: slate-300
    name: Slate 300
    value: "#CAD5E2"
    description: Muted accent or disabled-state foreground in light mode.
  - id: slate-400
    name: Slate 400
    value: "#90A1B9"
    description: Mid-light tint — soft accent, hover wash, decorative fill.
  - id: slate-500
    name: Slate 500
    value: "#62748E"
    description: Mid stop — the canonical brand hue for chromatic palettes.
  - id: slate-600
    name: Slate 600
    value: "#45556C"
    description: Mid-dark stop — primary action in light mode for chromatic palettes.
  - id: slate-700
    name: Slate 700
    value: "#314158"
    description: Dark stop — pressed states, deeper emphasis.
  - id: slate-800
    name: Slate 800
    value: "#1D293D"
    description: Very dark stop — heavy emphasis, secondary text on light.
  - id: slate-900
    name: Slate 900
    value: "#0F172B"
    description: Near-darkest stop — body text on light, surface on dark.
  - id: slate-950
    name: Slate 950
    value: "#020618"
    description: Darkest stop — page background in dark mode.
  - id: pure-white
    name: Pure White
    value: "#FFFFFF"
    description: Maximum-elevation surface and high-contrast text in dark mode.
  - id: pure-black
    name: Pure Black
    value: "#000000"
    description: High-contrast text on light chromatic hues where the deepest stop reads as the hue, not black.

modes:
  light:
    roles:
      background: slate-50
      surface: slate-100
      surface-elevated: pure-white
      text-primary: slate-900
      text-secondary: slate-700
      text-tertiary: slate-500
      primary: slate-900
      primary-hover: slate-800
      accent: slate-600
      accent-hover: slate-500
      warning: slate-500
      warning-hover: slate-400
      error: slate-700
      success: slate-600
  dark:
    roles:
      background: slate-950
      surface: slate-900
      surface-elevated: slate-800
      text-primary: slate-50
      text-secondary: slate-300
      text-tertiary: slate-500
      primary: slate-100
      primary-hover: slate-200
      accent: slate-400
      accent-hover: slate-300
      warning: slate-400
      warning-hover: slate-500
      error: slate-300
      success: slate-400
