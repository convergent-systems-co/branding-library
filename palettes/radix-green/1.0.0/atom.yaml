kind: palette
id: radix-green
version: 1.0.0
name: Radix Green
description: >
  Radix UI's green scale — 12 semantically labeled steps published in
  both light and dark variants. A balanced green suitable for success states. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Green is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: green-1-light
    name: Green 1 (light)
    value: "#FBFEFC"
    description: App background.
  - id: green-2-light
    name: Green 2 (light)
    value: "#F4FBF6"
    description: Subtle background.
  - id: green-3-light
    name: Green 3 (light)
    value: "#E6F6EB"
    description: UI element background.
  - id: green-4-light
    name: Green 4 (light)
    value: "#D6F1DF"
    description: Hovered UI element background.
  - id: green-5-light
    name: Green 5 (light)
    value: "#C4E8D1"
    description: Active / selected UI element background.
  - id: green-6-light
    name: Green 6 (light)
    value: "#ADDDC0"
    description: Subtle borders and separators.
  - id: green-7-light
    name: Green 7 (light)
    value: "#8ECEAA"
    description: UI element border and focus rings.
  - id: green-8-light
    name: Green 8 (light)
    value: "#5BB98B"
    description: Hovered UI element border.
  - id: green-9-light
    name: Green 9 (light)
    value: "#30A46C"
    description: Solid background — the brand color step.
  - id: green-10-light
    name: Green 10 (light)
    value: "#2B9A66"
    description: Hovered solid background.
  - id: green-11-light
    name: Green 11 (light)
    value: "#218358"
    description: Low-contrast text.
  - id: green-12-light
    name: Green 12 (light)
    value: "#193B2D"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: green-1-dark
    name: Green 1 (dark)
    value: "#0E1512"
    description: App background.
  - id: green-2-dark
    name: Green 2 (dark)
    value: "#121B17"
    description: Subtle background.
  - id: green-3-dark
    name: Green 3 (dark)
    value: "#132D21"
    description: UI element background.
  - id: green-4-dark
    name: Green 4 (dark)
    value: "#113B29"
    description: Hovered UI element background.
  - id: green-5-dark
    name: Green 5 (dark)
    value: "#174933"
    description: Active / selected UI element background.
  - id: green-6-dark
    name: Green 6 (dark)
    value: "#20573E"
    description: Subtle borders and separators.
  - id: green-7-dark
    name: Green 7 (dark)
    value: "#28684A"
    description: UI element border and focus rings.
  - id: green-8-dark
    name: Green 8 (dark)
    value: "#2F7C57"
    description: Hovered UI element border.
  - id: green-9-dark
    name: Green 9 (dark)
    value: "#30A46C"
    description: Solid background — the brand color step.
  - id: green-10-dark
    name: Green 10 (dark)
    value: "#33B074"
    description: Hovered solid background.
  - id: green-11-dark
    name: Green 11 (dark)
    value: "#3DD68C"
    description: Low-contrast text.
  - id: green-12-dark
    name: Green 12 (dark)
    value: "#B1F1CB"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: green-1-light
      surface: green-2-light
      surface-elevated: green-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: green-9-light
      primary: green-9-light
      primary-hover: green-10-light
      accent: green-8-light
      accent-hover: green-7-light
      warning: green-9-light
      warning-hover: green-10-light
      error: green-12-light
      success: green-9-light
  dark:
    roles:
      background: green-1-dark
      surface: green-2-dark
      surface-elevated: green-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: green-9-dark
      primary: green-9-dark
      primary-hover: green-10-dark
      accent: green-8-dark
      accent-hover: green-7-dark
      warning: green-9-dark
      warning-hover: green-10-dark
      error: green-12-dark
      success: green-9-dark
