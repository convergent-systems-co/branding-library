modes:
  light:
    # Maps to Carbon's "White" theme.
    roles:
      background: white
      surface: gray-10
      surface-elevated: white
      text-primary: gray-100
      text-secondary: gray-70
      text-tertiary: gray-60
      primary: blue-60
      primary-hover: blue-70
      accent: purple-60
      secondary-accent: magenta-60
      success: green-50
      warning: yellow-30
      error: red-60
      info: cyan-60
      annotation: teal-60
      special: purple-60
      outline: gray-30
      cta: blue-60
  dark:
    # Maps to Carbon's "Gray 100" theme.
    roles:
      background: gray-100
      surface: gray-90
      surface-elevated: gray-80
      text-primary: gray-10
      text-secondary: gray-30
      text-tertiary: gray-50
      primary: blue-60
      primary-hover: blue-50
      accent: purple-60
      secondary-accent: magenta-60
      success: green-40
      warning: yellow-30
      error: red-50
      info: cyan-60
      annotation: teal-60
      special: purple-60
      outline: gray-70
      cta: blue-60
