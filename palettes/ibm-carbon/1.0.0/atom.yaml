kind: palette
id: ibm-carbon
version: 1.0.0
name: IBM Carbon Design System
description: >
  Carbon's core color palette — IBM's open-source design system color
  primitives. Includes the Gray 10–100 neutral ramp and the named hue
  ramps (Blue, Red, Green, Yellow, Magenta, Purple, Teal, Cyan) that
  underpin Carbon themes (White, Gray 10, Gray 90, Gray 100).
tags: [corporate, ibm, carbon, design-system, light, dark]

provenance:
  source: https://github.com/carbon-design-system/carbon/blob/main/packages/colors/src/colors.js
  license: Apache-2.0
  attribution: IBM Carbon Design System, Copyright IBM Corp. (carbon-design-system/carbon)
  importedDate: 2026-05-17

