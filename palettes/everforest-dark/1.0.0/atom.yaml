kind: palette
id: everforest-dark
version: 1.0.0
name: Everforest Dark
description: >
  Sainnhe's Everforest — dark variant at medium contrast. Warm, woodsy
  green-and-tan palette designed for comfortable long sessions. Soft
  red/orange/yellow/green/aqua/blue/purple accents on a muted forest-green
  background.
tags: [dev-theme, dark, modern, everforest, soft]

provenance:
  source: https://github.com/sainnhe/everforest
  license: MIT
  attribution: Everforest by sainnhe (sainnhe/everforest)
  importedDate: 2026-05-17

