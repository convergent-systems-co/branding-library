kind: palette
id: atlassian
version: 1.0.0
name: Atlassian
description: >
  Atlassian's design-token palette, sourced from the
  `@atlaskit/tokens` package — the package that backs every product
  surface in the Atlassian portfolio (Jira, Confluence, Trello,
  Bitbucket, Compass, Loom, Statuspage). Nine chromatic families
  (Blue, Teal, Green, Lime, Yellow, Orange, Red, Magenta, Purple)
  running 100 → 1000 with 250 / 850 odd-stops, plus two neutral
  scales (Neutral for light surfaces, DarkNeutral for dark surfaces)
  and a set of translucent alpha overlays. Atlassian Blue 700
  (#1868DB) anchors the primary interactive role on light surfaces;
  Blue 400 (#669DF1) takes that role on dark surfaces. The Neutral
  scale supplies the canvas, surface, and text tokens for light
  mode; DarkNeutral plays the same role in dark mode.

tags: [atlassian, atlaskit, design-system, role-based, dual-mode]

provenance:
  source: https://github.com/pioug/atlassian-frontend-mirror/blob/main/design-system/tokens/src/artifacts/palettes-raw/palette.tsx
  license: Apache-2.0
  attribution: >
    Atlassian design tokens, Copyright Atlassian Pty Ltd, published
    under Apache-2.0 in the `@atlaskit/tokens` package. Hex values
    mirrored from the codegen palette artifact in the public
    `atlassian-frontend` mirror. Atlassian, Jira, Confluence, Trello,
    and associated marks are property of Atlassian Pty Ltd.
  importedDate: 2026-05-19
  importedFromVersion: "atlassian-frontend palettes-raw@2026-05"
  notes: >
    Full Atlassian Design System palette captured 2026-05-19: nine
    chromatic families (Blue, Teal, Green, Lime, Yellow, Orange, Red,
    Magenta, Purple) at every documented stop (100, 200, 250, 300,
    400, 500, 600, 700, 800, 850, 900, 1000), plus the Neutral scale
    used for light-mode canvas/surface/text (0, 100, 200, 300..1100)
    and the DarkNeutral scale used for dark-mode canvas/surface/text
    (0, 100, 200, 250, 300, 350, 400..1100). Translucent alpha
    overlays (Neutral{100..500}A and DarkNeutral{100..500,250,350}A)
    are captured as 8-digit hex values for accessibility-tuned
    overlays.

