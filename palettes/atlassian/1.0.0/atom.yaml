kind: palette
id: atlassian
version: 1.0.0
name: Atlassian Design System
description: >
  Atlassian's classic color primitives — the foundational color ramps that
  underpin Jira, Confluence, Bitbucket, and every Atlassian product. Defines
  the canonical Blue/Green/Yellow/Red/Purple/Teal accents and the N0–N900
  neutral scale, with semantic light/dark role mappings.
tags: [corporate, atlassian, design-system, light, dark]

provenance:
  source: https://atlassian.design/foundations/color-new/color-palette-new
  license: Apache-2.0
  attribution: Atlassian Design System color palette, Copyright Atlassian Pty Ltd.
  importedDate: 2026-05-17
  notes: >
    Color values from Atlassian's published design-system color palette
    (Atlassian Design Guidelines). Atlassian's pattern library and design
    tokens are publicly available under Apache-2.0 via their
    @atlaskit packages.

swatches:
