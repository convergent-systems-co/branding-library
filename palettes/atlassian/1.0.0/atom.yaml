    value: "#FFFFFF"
  - id: n10
    name: Neutral 10
    value: "#FAFBFC"
  - id: n20
    name: Neutral 20
    value: "#F4F5F7"
  - id: n30
    name: Neutral 30
    value: "#EBECF0"
  - id: n40
    name: Neutral 40
    value: "#DFE1E6"
  - id: n50
    name: Neutral 50
    value: "#C1C7D0"
  - id: n100
    name: Neutral 100
    value: "#7A869A"
  - id: n200
    name: Neutral 200
    value: "#6B778C"
  - id: n300
    name: Neutral 300
