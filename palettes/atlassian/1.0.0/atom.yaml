modes:
  light:
    roles:
      background: n0
      surface: n10
      surface-elevated: n0
      text-primary: n900
      text-secondary: n700
      text-tertiary: n200
      primary: blue-400
      primary-hover: blue-500
      accent: blue-400
      secondary-accent: purple-400
      success: green-400
      warning: yellow-400
      error: red-400
      info: blue-400
      annotation: teal-400
      special: purple-400
      outline: n40
      cta: blue-400
  dark:
    # Atlassian's dark mode tokens — uses the upper neutral scale as surfaces.
    roles:
      background: n900
      surface: n800
      surface-elevated: n700
      text-primary: n0
      text-secondary: n30
      text-tertiary: n100
      primary: blue-300
      primary-hover: blue-400
      accent: blue-300
      secondary-accent: purple-300
      success: green-300
      warning: yellow-300
      error: red-300
      info: blue-300
      annotation: teal-300
      special: purple-300
      outline: n500
      cta: blue-300
