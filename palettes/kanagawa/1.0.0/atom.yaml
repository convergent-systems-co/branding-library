kind: palette
id: kanagawa
version: 1.0.0
name: Kanagawa
description: >
  A theme inspired by Hokusai's "The Great Wave off Kanagawa" — dark
  inks (sumiInk), warm winter whites (fuji), and accent palettes named
  for waves, springs, and seasonal moods. Three official variants ship
  upstream — Wave (dark default), Dragon (deepest dark), Lotus (light).

  Dark mode is sourced from the Wave variant; light mode is sourced
  from the Lotus variant. Both use the same upstream palette dict
  filtered through their respective theme mapping.
tags: [kanagawa, editor, dual-mode, japanese, painterly]

provenance:
  source: https://github.com/rebelot/kanagawa.nvim/blob/master/lua/kanagawa/colors.lua
  license: MIT
  attribution: Kanagawa.nvim by rebelot — github.com/rebelot/kanagawa.nvim
  importedDate: 2026-05-17
  notes: >
    Hex values from lua/kanagawa/colors.lua (the canonical palette dict).
    Wave-to-role and Lotus-to-role mappings follow themes.lua's wave()
    and lotus() functions verbatim.

