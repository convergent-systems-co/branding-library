kind: palette
id: tailwind-yellow
version: 1.0.0
name: Tailwind Yellow
description: >
  Tailwind CSS's yellow hue family — 11 stops from 50 (lightest) to
  950 (darkest), forming a bright yellow chromatic scale. Use directly as a brand
  palette or pair with an accent hue from another tailwind-* atom.
tags: [tailwind, warm, chromatic]

provenance:
  source: https://tailwindcss.com/docs/colors
  license: MIT
  attribution: >
    Tailwind CSS colors, Copyright Tailwind Labs Inc., MIT licensed.
    Hex values derived from canonical OKLCH definitions in
    packages/tailwindcss/theme.css via the W3C CSS Color Module Level 4
    OKLCH → sRGB conversion.
  importedDate: 2026-05-17
  importedFromVersion: "4.3.0"

swatches:
  - id: yellow-50
    name: Yellow 50
    value: "#FEFCE8"
    description: Lightest stop — page background in light mode.
  - id: yellow-100
    name: Yellow 100
    value: "#FEF9C2"
    description: Very light surface — cards and panels on light background.
  - id: yellow-200
    name: Yellow 200
    value: "#FFF085"
    description: Light divider, hairline, or subtle fill.
  - id: yellow-300
    name: Yellow 300
    value: "#FFDF20"
    description: Muted accent or disabled-state foreground in light mode.
  - id: yellow-400
    name: Yellow 400
    value: "#FDC700"
    description: Mid-light tint — soft accent, hover wash, decorative fill.
  - id: yellow-500
    name: Yellow 500
    value: "#F0B100"
    description: Mid stop — the canonical brand hue for chromatic palettes.
  - id: yellow-600
    name: Yellow 600
    value: "#D08700"
    description: Mid-dark stop — primary action in light mode for chromatic palettes.
  - id: yellow-700
    name: Yellow 700
    value: "#A65F00"
    description: Dark stop — pressed states, deeper emphasis.
  - id: yellow-800
    name: Yellow 800
    value: "#894B00"
    description: Very dark stop — heavy emphasis, secondary text on light.
  - id: yellow-900
    name: Yellow 900
    value: "#733E0A"
    description: Near-darkest stop — body text on light, surface on dark.
  - id: yellow-950
    name: Yellow 950
    value: "#432004"
    description: Darkest stop — page background in dark mode.
  - id: pure-white
    name: Pure White
    value: "#FFFFFF"
    description: Maximum-elevation surface and high-contrast text in dark mode.
  - id: pure-black
    name: Pure Black
    value: "#000000"
    description: High-contrast text on light chromatic hues where the deepest stop reads as the hue, not black.

modes:
  light:
    roles:
      background: yellow-50
      surface: yellow-100
      surface-elevated: pure-white
      text-primary: pure-black
      text-secondary: yellow-800
      text-tertiary: yellow-600
      primary: yellow-500
      primary-hover: yellow-600
      accent: yellow-700
      accent-hover: yellow-600
      warning: yellow-300
      warning-hover: yellow-400
      error: yellow-700
      success: yellow-600
  dark:
    roles:
      background: yellow-950
      surface: yellow-900
      surface-elevated: yellow-800
      text-primary: pure-white
      text-secondary: yellow-200
      text-tertiary: yellow-400
      primary: yellow-400
      primary-hover: yellow-300
      accent: yellow-300
      accent-hover: yellow-200
      warning: yellow-600
      warning-hover: yellow-500
      error: yellow-300
      success: yellow-400
