kind: palette
id: cambridge
version: 1.0.0
name: Cambridge
description: >
  The University of Cambridge brand palette as published in the
  Cambridge brand resources / colour guidelines. The core palette
  is built around a Cambridge Blue family — a distinctive light
  teal-cyan (#8EE8D8) that differentiates Cambridge from Oxford's
  navy — alongside Cambridge Dark Blue (#133844), Warm Blue
  (#00BDB6), and Light Blue (#D1F9F1). A heritage Cambridge Blue
  (#85B09A) preserves the traditional cooler shade. Five secondary
  colour families (Crest, Cherry, Purple, Indigo, Green) each
  carry a four-stop ramp, and a four-stop greyscale (Slate 1–4)
  provides neutrals.

tags: [cambridge, university, education, cambridge-blue, heritage, conservative-institutional, light-first]

provenance:
  source: https://www.cam.ac.uk/brand-resources/guidelines/colour
  license: Proprietary — All Rights Reserved (Cambridge trademarks)
  attribution: >
    The Chancellor, Masters, and Scholars of the University of
    Cambridge — palette captured from the University of Cambridge
    brand-resources colour guidelines (cam.ac.uk). "Cambridge,"
    "University of Cambridge," the Cambridge coat of arms, and
    the University shield are protected marks of the University
    of Cambridge.
  importedDate: 2026-05-19
  notes: >
    Cambridge's contemporary brand system distinguishes a
    refreshed core Cambridge Blue (#8EE8D8 — a light teal-cyan)
    from the heritage Cambridge Blue (#85B09A — closer to the
    traditional cool-green) that institutions historically use.
    Both are captured here. Cambridge Judge Yellow (#FFB81C) is
    a Judge Business School heritage colour included in the
    University-published brand resources but used selectively.
    Sub-brand schools (Judge Business School, Trinity, King's,
    etc.) carry their own atom-eligible identities and are out
    of scope for this atom — only the parent University palette
    is encoded here.

