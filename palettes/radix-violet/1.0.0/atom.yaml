kind: palette
id: radix-violet
version: 1.0.0
name: Radix Violet
description: >
  Radix UI's violet scale — 12 semantically labeled steps published in
  both light and dark variants. A balanced violet between blue and purple. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Violet is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: violet-1-light
    name: Violet 1 (light)
    value: "#FDFCFE"
    description: App background.
  - id: violet-2-light
    name: Violet 2 (light)
    value: "#FAF8FF"
    description: Subtle background.
  - id: violet-3-light
    name: Violet 3 (light)
    value: "#F4F0FE"
    description: UI element background.
  - id: violet-4-light
    name: Violet 4 (light)
    value: "#EBE4FF"
    description: Hovered UI element background.
  - id: violet-5-light
    name: Violet 5 (light)
    value: "#E1D9FF"
    description: Active / selected UI element background.
  - id: violet-6-light
    name: Violet 6 (light)
    value: "#D4CAFE"
    description: Subtle borders and separators.
  - id: violet-7-light
    name: Violet 7 (light)
    value: "#C2B5F5"
    description: UI element border and focus rings.
  - id: violet-8-light
    name: Violet 8 (light)
    value: "#AA99EC"
    description: Hovered UI element border.
  - id: violet-9-light
    name: Violet 9 (light)
    value: "#6E56CF"
    description: Solid background — the brand color step.
  - id: violet-10-light
    name: Violet 10 (light)
    value: "#654DC4"
    description: Hovered solid background.
  - id: violet-11-light
    name: Violet 11 (light)
    value: "#6550B9"
    description: Low-contrast text.
  - id: violet-12-light
    name: Violet 12 (light)
    value: "#2F265F"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: violet-1-dark
    name: Violet 1 (dark)
    value: "#14121F"
    description: App background.
  - id: violet-2-dark
    name: Violet 2 (dark)
    value: "#1B1525"
    description: Subtle background.
  - id: violet-3-dark
    name: Violet 3 (dark)
    value: "#291F43"
    description: UI element background.
  - id: violet-4-dark
    name: Violet 4 (dark)
    value: "#33255B"
    description: Hovered UI element background.
  - id: violet-5-dark
    name: Violet 5 (dark)
    value: "#3C2E69"
    description: Active / selected UI element background.
  - id: violet-6-dark
    name: Violet 6 (dark)
    value: "#473876"
    description: Subtle borders and separators.
  - id: violet-7-dark
    name: Violet 7 (dark)
    value: "#56468B"
    description: UI element border and focus rings.
  - id: violet-8-dark
    name: Violet 8 (dark)
    value: "#6958AD"
    description: Hovered UI element border.
  - id: violet-9-dark
    name: Violet 9 (dark)
    value: "#6E56CF"
    description: Solid background — the brand color step.
  - id: violet-10-dark
    name: Violet 10 (dark)
    value: "#7D66D9"
    description: Hovered solid background.
  - id: violet-11-dark
    name: Violet 11 (dark)
    value: "#BAA7FF"
    description: Low-contrast text.
  - id: violet-12-dark
    name: Violet 12 (dark)
    value: "#E2DDFE"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: violet-1-light
      surface: violet-2-light
      surface-elevated: violet-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: violet-9-light
      primary: violet-9-light
      primary-hover: violet-10-light
      accent: violet-8-light
      accent-hover: violet-7-light
      warning: violet-9-light
      warning-hover: violet-10-light
      error: violet-12-light
      success: violet-9-light
  dark:
    roles:
      background: violet-1-dark
      surface: violet-2-dark
      surface-elevated: violet-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: violet-9-dark
      primary: violet-9-dark
      primary-hover: violet-10-dark
      accent: violet-8-dark
      accent-hover: violet-7-dark
      warning: violet-9-dark
      warning-hover: violet-10-dark
      error: violet-12-dark
      success: violet-9-dark
