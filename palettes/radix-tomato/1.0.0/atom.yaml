kind: palette
id: radix-tomato
version: 1.0.0
name: Radix Tomato
description: >
  Radix UI's tomato scale — 12 semantically labeled steps published in
  both light and dark variants. A bold warm orange-red, very close to tomato. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, warm, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Tomato is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: tomato-1-light
    name: Tomato 1 (light)
    value: "#FFFCFC"
    description: App background.
  - id: tomato-2-light
    name: Tomato 2 (light)
    value: "#FFF8F7"
    description: Subtle background.
  - id: tomato-3-light
    name: Tomato 3 (light)
    value: "#FEEBE7"
    description: UI element background.
  - id: tomato-4-light
    name: Tomato 4 (light)
    value: "#FFDCD3"
    description: Hovered UI element background.
  - id: tomato-5-light
    name: Tomato 5 (light)
    value: "#FFCDC2"
    description: Active / selected UI element background.
  - id: tomato-6-light
    name: Tomato 6 (light)
    value: "#FDBDAF"
    description: Subtle borders and separators.
  - id: tomato-7-light
    name: Tomato 7 (light)
    value: "#F5A898"
    description: UI element border and focus rings.
  - id: tomato-8-light
    name: Tomato 8 (light)
    value: "#EC8E7B"
    description: Hovered UI element border.
  - id: tomato-9-light
    name: Tomato 9 (light)
    value: "#E54D2E"
    description: Solid background — the brand color step.
  - id: tomato-10-light
    name: Tomato 10 (light)
    value: "#DD4425"
    description: Hovered solid background.
  - id: tomato-11-light
    name: Tomato 11 (light)
    value: "#D13415"
    description: Low-contrast text.
  - id: tomato-12-light
    name: Tomato 12 (light)
    value: "#5C271F"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: tomato-1-dark
    name: Tomato 1 (dark)
    value: "#181111"
    description: App background.
  - id: tomato-2-dark
    name: Tomato 2 (dark)
    value: "#1F1513"
    description: Subtle background.
  - id: tomato-3-dark
    name: Tomato 3 (dark)
    value: "#391714"
    description: UI element background.
  - id: tomato-4-dark
    name: Tomato 4 (dark)
    value: "#4E1511"
    description: Hovered UI element background.
  - id: tomato-5-dark
    name: Tomato 5 (dark)
    value: "#5E1C16"
    description: Active / selected UI element background.
  - id: tomato-6-dark
    name: Tomato 6 (dark)
    value: "#6E2920"
    description: Subtle borders and separators.
  - id: tomato-7-dark
    name: Tomato 7 (dark)
    value: "#853A2D"
    description: UI element border and focus rings.
  - id: tomato-8-dark
    name: Tomato 8 (dark)
    value: "#AC4D39"
    description: Hovered UI element border.
  - id: tomato-9-dark
    name: Tomato 9 (dark)
    value: "#E54D2E"
    description: Solid background — the brand color step.
  - id: tomato-10-dark
    name: Tomato 10 (dark)
    value: "#EC6142"
    description: Hovered solid background.
  - id: tomato-11-dark
    name: Tomato 11 (dark)
    value: "#FF977D"
    description: Low-contrast text.
  - id: tomato-12-dark
    name: Tomato 12 (dark)
    value: "#FBD3CB"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: tomato-1-light
      surface: tomato-2-light
      surface-elevated: tomato-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: tomato-9-light
      primary: tomato-9-light
      primary-hover: tomato-10-light
      accent: tomato-8-light
      accent-hover: tomato-7-light
      warning: tomato-9-light
      warning-hover: tomato-10-light
      error: tomato-12-light
      success: tomato-9-light
  dark:
    roles:
      background: tomato-1-dark
      surface: tomato-2-dark
      surface-elevated: tomato-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: tomato-9-dark
      primary: tomato-9-dark
      primary-hover: tomato-10-dark
      accent: tomato-8-dark
      accent-hover: tomato-7-dark
      warning: tomato-9-dark
      warning-hover: tomato-10-dark
      error: tomato-12-dark
      success: tomato-9-dark
