kind: palette
id: tailwind-fuchsia
version: 1.0.0
name: Tailwind Fuchsia
description: >
  Tailwind CSS's fuchsia hue family — 11 stops from 50 (lightest) to
  950 (darkest), forming a vivid magenta chromatic scale. Use directly as a brand
  palette or pair with an accent hue from another tailwind-* atom.
tags: [tailwind, warm, chromatic]

provenance:
  source: https://tailwindcss.com/docs/colors
  license: MIT
  attribution: >
    Tailwind CSS colors, Copyright Tailwind Labs Inc., MIT licensed.
    Hex values derived from canonical OKLCH definitions in
    packages/tailwindcss/theme.css via the W3C CSS Color Module Level 4
    OKLCH → sRGB conversion.
  importedDate: 2026-05-18
  importedFromVersion: "4.x"

swatches:
  - id: fuchsia-50
    name: Fuchsia 50
    value: "#FDF4FF"
    description: Lightest stop — page background in light mode.
  - id: fuchsia-100
    name: Fuchsia 100
    value: "#FAE8FF"
    description: Very light surface — cards and panels on light background.
  - id: fuchsia-200
    name: Fuchsia 200
    value: "#F6CFFF"
    description: Light divider, hairline, or subtle fill.
  - id: fuchsia-300
    name: Fuchsia 300
    value: "#F4A8FF"
    description: Muted accent or disabled-state foreground in light mode.
  - id: fuchsia-400
    name: Fuchsia 400
    value: "#ED6AFF"
    description: Mid-light tint — soft accent, hover wash, decorative fill.
  - id: fuchsia-500
    name: Fuchsia 500
    value: "#E12AFB"
    description: Mid stop — the canonical brand hue for chromatic palettes.
  - id: fuchsia-600
    name: Fuchsia 600
    value: "#C800DE"
    description: Mid-dark stop — primary action in light mode for chromatic palettes.
  - id: fuchsia-700
    name: Fuchsia 700
    value: "#A800B7"
    description: Dark stop — pressed states, deeper emphasis.
  - id: fuchsia-800
    name: Fuchsia 800
    value: "#8A0194"
    description: Very dark stop — heavy emphasis, secondary text on light.
  - id: fuchsia-900
    name: Fuchsia 900
    value: "#721378"
    description: Near-darkest stop — body text on light, surface on dark.
  - id: fuchsia-950
    name: Fuchsia 950
    value: "#4B004F"
    description: Darkest stop — page background in dark mode.
  - id: pure-white
    name: Pure White
    value: "#FFFFFF"
    description: Maximum-elevation surface and high-contrast text in dark mode.
  - id: pure-black
    name: Pure Black
    value: "#000000"
    description: High-contrast text on light chromatic hues where the deepest stop reads as the hue, not black.

modes:
  light:
    roles:
      background: fuchsia-50
      surface: fuchsia-100
      surface-elevated: pure-white
      text-primary: fuchsia-900
      text-secondary: fuchsia-800
      text-tertiary: fuchsia-600
      primary: fuchsia-500
      primary-hover: fuchsia-600
      accent: fuchsia-700
      accent-hover: fuchsia-600
      warning: fuchsia-300
      warning-hover: fuchsia-400
      error: fuchsia-700
      success: fuchsia-600
  dark:
    roles:
      background: fuchsia-950
      surface: fuchsia-900
      surface-elevated: fuchsia-800
      text-primary: fuchsia-50
      text-secondary: fuchsia-200
      text-tertiary: fuchsia-400
      primary: fuchsia-400
      primary-hover: fuchsia-300
      accent: fuchsia-300
      accent-hover: fuchsia-200
      warning: fuchsia-600
      warning-hover: fuchsia-500
      error: fuchsia-300
      success: fuchsia-400
