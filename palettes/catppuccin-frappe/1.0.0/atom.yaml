kind: palette
id: catppuccin-frappe
version: 1.0.0
name: Catppuccin Frappe
description: Catppuccin Frappe - a soothing dark pastel theme. Native dark mode; the light mode role map is a sensible inversion that preserves accent identity (mauve = primary, etc.).
tags:
  - catppuccin
  - dark
  - pastel
  - developer
provenance:
  source: https://raw.githubusercontent.com/catppuccin/palette/main/palette.json
  license: MIT
  attribution: Catppuccin palette by the Catppuccin organization (github.com/catppuccin/palette)
  importedDate: 2026-05-17
  importedFromVersion: 1.8.0
  notes: "Hex values verbatim from the upstream palette.json. Role mappings follow Catppuccin's design guidance: the same accent name (mauve = primary, red = error, green = success, peach = warning) is used across all four flavors so themes can be switched without changing role semantics."
