kind: palette
id: material-3
version: 1.0.0
name: Material 3 (Material You) — Baseline
description: >
  The Material Design 3 baseline color scheme generated from seed color
  #6750A4 (purple). Provides tonal palettes (primary, secondary, tertiary,
  error, neutral, neutral-variant) at canonical tones, plus full M3
  system role mappings for both light and dark schemes.
tags: [material, google, m3, role-based, tonal-palette]

provenance:
  source: https://github.com/material-components/material-web/blob/main/tokens/versions/v0_192/_md-ref-palette.scss
  license: Apache-2.0
  attribution: >
    Material Design 3 reference palette, Copyright Google LLC, licensed
    under Apache License 2.0. Baseline scheme generated via the HCT
    algorithm from seed color #6750A4.
  importedDate: 2026-05-15
  importedFromVersion: v0.192
  notes: >
    System role → tone mappings sourced from Flutter material library
    gen_defaults data files (color_light.json, color_dark.json).

