kind: palette
id: radix-mauve
version: 1.0.0
name: Radix Mauve
description: >
  Radix UI's mauve scale — 12 semantically labeled steps published in
  both light and dark variants. A warm, near-purple gray. Pairs well with purple, pink, and red-leaning hues. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, neutral, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Mauve is a neutral, so every semantic role — including text — is drawn from the mauve scale itself.

