kind: palette
id: adobe
version: 1.0.0
name: Adobe Spectrum
description: >
  Adobe Spectrum's color system — the design system that powers Adobe's
  product surfaces (Creative Cloud, Document Cloud, Experience Cloud).
  Spectrum is built on tonally-paired neutral and chromatic scales (gray,
  blue, red, orange, yellow, chartreuse, celery, green, seafoam, cyan,
  indigo, purple, fuchsia, magenta, pink, brown, silver, cinnamon,
  turquoise), each running 100 → 1600 with a light-mode hex and a
  dark-mode counterpart. The brand accent on product surfaces is
  Spectrum Blue 900 (#3B63FB light / #5681FF dark) — the same swatch
  that backs the `accent-background-color-default` token. Semantic role
  tokens (positive, negative, notice, informative) map onto the same
  scales: positive=green-900, negative=red-900, notice=orange-900,
  informative=blue-900.

tags: [adobe, spectrum, design-system, role-based, dual-mode]

provenance:
  source: https://github.com/adobe/spectrum-css/blob/main/tokens/dist/json/tokens.json
  license: Apache-2.0
  attribution: >
    Adobe Spectrum design tokens, Copyright Adobe Inc., licensed under
    Apache-2.0. Hex values mirrored from the Spectrum CSS token export
    (`tokens/dist/json/tokens.json`) on the `main` branch. Adobe, Adobe
    Spectrum, and associated marks are property of Adobe Inc.
  importedDate: 2026-05-19
  importedFromVersion: "@spectrum-css/tokens main@2026-05"
  notes: >
    Full Spectrum grid captured 2026-05-19: 18 chromatic families
    (blue, red, orange, yellow, chartreuse, celery, green, seafoam,
    cyan, indigo, purple, fuchsia, magenta, pink, brown, silver,
    cinnamon, turquoise) at 16 stops each (100..1600), plus the gray
    neutral scale (25, 50, 75, 100..1000). Spectrum is dual-mode by
    construction — every stop has both a light and dark hex. The
    catalogue captures both as separate swatches (e.g., `blue-900`
    for light, `blue-900-dark` for dark) so that mode mappings can
    name a single swatch ID per role.

