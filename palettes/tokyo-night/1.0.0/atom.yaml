kind: palette
id: tokyo-night
version: 1.0.0
name: Tokyo Night
description: >
  A clean, dark theme inspired by the lights of downtown Tokyo at night.
  Soft blue-violet canvas with bright cool accents (blue, cyan, magenta,
  green) and warm orange/yellow highlights. The Night style is the
  default dark variant; Day is the inverted bright counterpart.

  Dark mode is sourced from the Night style; light mode is sourced from
  the Day style — both shipped officially upstream.
tags: [tokyo-night, editor, dark-first, dual-mode, neon]

provenance:
  source: https://github.com/folke/tokyonight.nvim
  license: MIT
  attribution: TokyoNight.nvim by Folke Lemaitre (folke) — github.com/folke/tokyonight.nvim
  importedDate: 2026-05-17
  notes: >
    Dark-mode hex values are from lua/tokyonight/colors/storm.lua with
    the bg overrides from lua/tokyonight/colors/night.lua. Light-mode
    hex values are from extras/lua/tokyonight_day.lua (the resolved
    output of the day-mode invert pipeline shipped upstream).

