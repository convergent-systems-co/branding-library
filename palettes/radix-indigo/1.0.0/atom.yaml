kind: palette
id: radix-indigo
version: 1.0.0
name: Radix Indigo
description: >
  Radix UI's indigo scale — 12 semantically labeled steps published in
  both light and dark variants. A deeper, more violet-leaning blue. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Indigo is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: indigo-1-light
    name: Indigo 1 (light)
    value: "#FDFDFE"
    description: App background.
  - id: indigo-2-light
    name: Indigo 2 (light)
    value: "#F7F9FF"
    description: Subtle background.
  - id: indigo-3-light
    name: Indigo 3 (light)
    value: "#EDF2FE"
    description: UI element background.
  - id: indigo-4-light
    name: Indigo 4 (light)
    value: "#E1E9FF"
    description: Hovered UI element background.
  - id: indigo-5-light
    name: Indigo 5 (light)
    value: "#D2DEFF"
    description: Active / selected UI element background.
  - id: indigo-6-light
    name: Indigo 6 (light)
    value: "#C1D0FF"
    description: Subtle borders and separators.
  - id: indigo-7-light
    name: Indigo 7 (light)
    value: "#ABBDF9"
    description: UI element border and focus rings.
  - id: indigo-8-light
    name: Indigo 8 (light)
    value: "#8DA4EF"
    description: Hovered UI element border.
  - id: indigo-9-light
    name: Indigo 9 (light)
    value: "#3E63DD"
    description: Solid background — the brand color step.
  - id: indigo-10-light
    name: Indigo 10 (light)
    value: "#3358D4"
    description: Hovered solid background.
  - id: indigo-11-light
    name: Indigo 11 (light)
    value: "#3A5BC7"
    description: Low-contrast text.
  - id: indigo-12-light
    name: Indigo 12 (light)
    value: "#1F2D5C"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: indigo-1-dark
    name: Indigo 1 (dark)
    value: "#11131F"
    description: App background.
  - id: indigo-2-dark
    name: Indigo 2 (dark)
    value: "#141726"
    description: Subtle background.
  - id: indigo-3-dark
    name: Indigo 3 (dark)
    value: "#182449"
    description: UI element background.
  - id: indigo-4-dark
    name: Indigo 4 (dark)
    value: "#1D2E62"
    description: Hovered UI element background.
  - id: indigo-5-dark
    name: Indigo 5 (dark)
    value: "#253974"
    description: Active / selected UI element background.
  - id: indigo-6-dark
    name: Indigo 6 (dark)
    value: "#304384"
    description: Subtle borders and separators.
  - id: indigo-7-dark
    name: Indigo 7 (dark)
    value: "#3A4F97"
    description: UI element border and focus rings.
  - id: indigo-8-dark
    name: Indigo 8 (dark)
    value: "#435DB1"
    description: Hovered UI element border.
  - id: indigo-9-dark
    name: Indigo 9 (dark)
    value: "#3E63DD"
    description: Solid background — the brand color step.
  - id: indigo-10-dark
    name: Indigo 10 (dark)
    value: "#5472E4"
    description: Hovered solid background.
  - id: indigo-11-dark
    name: Indigo 11 (dark)
    value: "#9EB1FF"
    description: Low-contrast text.
  - id: indigo-12-dark
    name: Indigo 12 (dark)
    value: "#D6E1FF"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: indigo-1-light
      surface: indigo-2-light
      surface-elevated: indigo-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: indigo-9-light
      primary: indigo-9-light
      primary-hover: indigo-10-light
      accent: indigo-8-light
      accent-hover: indigo-7-light
      warning: indigo-9-light
      warning-hover: indigo-10-light
      error: indigo-12-light
      success: indigo-9-light
  dark:
    roles:
      background: indigo-1-dark
      surface: indigo-2-dark
      surface-elevated: indigo-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: indigo-9-dark
      primary: indigo-9-dark
      primary-hover: indigo-10-dark
      accent: indigo-8-dark
      accent-hover: indigo-7-dark
      warning: indigo-9-dark
      warning-hover: indigo-10-dark
      error: indigo-12-dark
      success: indigo-9-dark
