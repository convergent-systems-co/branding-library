modes:
  light:
    # Mirrors polaris-tokens/src/themes/base/color.ts
    roles:
      background: gray-6
      surface: gray-1
      surface-elevated: gray-1
      text-primary: gray-16
      text-secondary: gray-13
      text-tertiary: gray-12
      primary: blue-13
      primary-hover: blue-14
      accent: magenta-13
      accent-hover: magenta-14
      warning: orange-13
      warning-hover: orange-14
      error: red-13
      success: green-13
      border: gray-8
      brand: green-13

  dark:
