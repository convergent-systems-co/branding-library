kind: palette
id: polaris
version: 1.0.0
name: Shopify Polaris
description: >
  The Shopify Polaris color palette as shipped by `@shopify/polaris-tokens`.
  Thirteen base color scales (gray, azure, blue, cyan, green, lime, magenta,
  orange, purple, red, rose, teal, yellow) each at 16 stops (1..16) where
  1 is the lightest and 16 the deepest. Plus alpha-only scales for black
  and white at 16 stops apiece.

  The light theme is the Polaris base theme; the dark theme overrides
  selected role values to invert the canvas. Role mappings are derived
  from the canonical `themes/base/color.ts` (light) and `themes/dark.ts`
  (dark) sources in polaris-tokens.

tags: [design-system, shopify, polaris, role-based]

provenance:
  source: https://github.com/Shopify/polaris/blob/main/polaris-tokens/src/themes/base/color.ts
  license: MIT
  attribution: >
    Polaris Design System tokens, Copyright (c) Shopify Inc., licensed under
    MIT. Hex values converted from rgba() definitions in
    polaris-tokens/src/colors.ts; role mappings derived from
    polaris-tokens/src/themes/base/color.ts and themes/dark.ts.
  importedDate: 2026-05-17
  importedFromVersion: "@shopify/polaris-tokens@9.4.2"

