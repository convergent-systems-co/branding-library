kind: palette
id: radix-sky
version: 1.0.0
name: Radix Sky
description: >
  Radix UI's sky scale — 12 semantically labeled steps published in
  both light and dark variants. A bright, light-leaning sky blue. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Sky is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: sky-1-light
    name: Sky 1 (light)
    value: "#F9FEFF"
    description: App background.
  - id: sky-2-light
    name: Sky 2 (light)
    value: "#F1FAFD"
    description: Subtle background.
  - id: sky-3-light
    name: Sky 3 (light)
    value: "#E1F6FD"
    description: UI element background.
  - id: sky-4-light
    name: Sky 4 (light)
    value: "#D1F0FA"
    description: Hovered UI element background.
  - id: sky-5-light
    name: Sky 5 (light)
    value: "#BEE7F5"
    description: Active / selected UI element background.
  - id: sky-6-light
    name: Sky 6 (light)
    value: "#A9DAED"
    description: Subtle borders and separators.
  - id: sky-7-light
    name: Sky 7 (light)
    value: "#8DCAE3"
    description: UI element border and focus rings.
  - id: sky-8-light
    name: Sky 8 (light)
    value: "#60B3D7"
    description: Hovered UI element border.
  - id: sky-9-light
    name: Sky 9 (light)
    value: "#7CE2FE"
    description: Solid background — the brand color step.
  - id: sky-10-light
    name: Sky 10 (light)
    value: "#74DAF8"
    description: Hovered solid background.
  - id: sky-11-light
    name: Sky 11 (light)
    value: "#00749E"
    description: Low-contrast text.
  - id: sky-12-light
    name: Sky 12 (light)
    value: "#1D3E56"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: sky-1-dark
    name: Sky 1 (dark)
    value: "#0D141F"
    description: App background.
  - id: sky-2-dark
    name: Sky 2 (dark)
    value: "#111A27"
    description: Subtle background.
  - id: sky-3-dark
    name: Sky 3 (dark)
    value: "#112840"
    description: UI element background.
  - id: sky-4-dark
    name: Sky 4 (dark)
    value: "#113555"
    description: Hovered UI element background.
  - id: sky-5-dark
    name: Sky 5 (dark)
    value: "#154467"
    description: Active / selected UI element background.
  - id: sky-6-dark
    name: Sky 6 (dark)
    value: "#1B537B"
    description: Subtle borders and separators.
  - id: sky-7-dark
    name: Sky 7 (dark)
    value: "#1F6692"
    description: UI element border and focus rings.
  - id: sky-8-dark
    name: Sky 8 (dark)
    value: "#197CAE"
    description: Hovered UI element border.
  - id: sky-9-dark
    name: Sky 9 (dark)
    value: "#7CE2FE"
    description: Solid background — the brand color step.
  - id: sky-10-dark
    name: Sky 10 (dark)
    value: "#A8EEFF"
    description: Hovered solid background.
  - id: sky-11-dark
    name: Sky 11 (dark)
    value: "#75C7F0"
    description: Low-contrast text.
  - id: sky-12-dark
    name: Sky 12 (dark)
    value: "#C2F3FF"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: sky-1-light
      surface: sky-2-light
      surface-elevated: sky-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: sky-9-light
      primary: sky-9-light
      primary-hover: sky-10-light
      accent: sky-8-light
      accent-hover: sky-7-light
      warning: sky-9-light
      warning-hover: sky-10-light
      error: sky-12-light
      success: sky-9-light
  dark:
    roles:
      background: sky-1-dark
      surface: sky-2-dark
      surface-elevated: sky-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: sky-9-dark
      primary: sky-9-dark
      primary-hover: sky-10-dark
      accent: sky-8-dark
      accent-hover: sky-7-dark
      warning: sky-9-dark
      warning-hover: sky-10-dark
      error: sky-12-dark
      success: sky-9-dark
