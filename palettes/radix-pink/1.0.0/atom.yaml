kind: palette
id: radix-pink
version: 1.0.0
name: Radix Pink
description: >
  Radix UI's pink scale — 12 semantically labeled steps published in
  both light and dark variants. A bright magenta-pink, between red and purple. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, warm, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Pink is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: pink-1-light
    name: Pink 1 (light)
    value: "#FFFCFE"
    description: App background.
  - id: pink-2-light
    name: Pink 2 (light)
    value: "#FEF7FB"
    description: Subtle background.
  - id: pink-3-light
    name: Pink 3 (light)
    value: "#FEE9F5"
    description: UI element background.
  - id: pink-4-light
    name: Pink 4 (light)
    value: "#FBDCEF"
    description: Hovered UI element background.
  - id: pink-5-light
    name: Pink 5 (light)
    value: "#F6CEE7"
    description: Active / selected UI element background.
  - id: pink-6-light
    name: Pink 6 (light)
    value: "#EFBFDD"
    description: Subtle borders and separators.
  - id: pink-7-light
    name: Pink 7 (light)
    value: "#E7ACD0"
    description: UI element border and focus rings.
  - id: pink-8-light
    name: Pink 8 (light)
    value: "#DD93C2"
    description: Hovered UI element border.
  - id: pink-9-light
    name: Pink 9 (light)
    value: "#D6409F"
    description: Solid background — the brand color step.
  - id: pink-10-light
    name: Pink 10 (light)
    value: "#CF3897"
    description: Hovered solid background.
  - id: pink-11-light
    name: Pink 11 (light)
    value: "#C2298A"
    description: Low-contrast text.
  - id: pink-12-light
    name: Pink 12 (light)
    value: "#651249"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: pink-1-dark
    name: Pink 1 (dark)
    value: "#191117"
    description: App background.
  - id: pink-2-dark
    name: Pink 2 (dark)
    value: "#21121D"
    description: Subtle background.
  - id: pink-3-dark
    name: Pink 3 (dark)
    value: "#37172F"
    description: UI element background.
  - id: pink-4-dark
    name: Pink 4 (dark)
    value: "#4B143D"
    description: Hovered UI element background.
  - id: pink-5-dark
    name: Pink 5 (dark)
    value: "#591C47"
    description: Active / selected UI element background.
  - id: pink-6-dark
    name: Pink 6 (dark)
    value: "#692955"
    description: Subtle borders and separators.
  - id: pink-7-dark
    name: Pink 7 (dark)
    value: "#833869"
    description: UI element border and focus rings.
  - id: pink-8-dark
    name: Pink 8 (dark)
    value: "#A84885"
    description: Hovered UI element border.
  - id: pink-9-dark
    name: Pink 9 (dark)
    value: "#D6409F"
    description: Solid background — the brand color step.
  - id: pink-10-dark
    name: Pink 10 (dark)
    value: "#DE51A8"
    description: Hovered solid background.
  - id: pink-11-dark
    name: Pink 11 (dark)
    value: "#FF8DCC"
    description: Low-contrast text.
  - id: pink-12-dark
    name: Pink 12 (dark)
    value: "#FDD1EA"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: pink-1-light
      surface: pink-2-light
      surface-elevated: pink-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: pink-9-light
      primary: pink-9-light
      primary-hover: pink-10-light
      accent: pink-8-light
      accent-hover: pink-7-light
      warning: pink-9-light
      warning-hover: pink-10-light
      error: pink-12-light
      success: pink-9-light
  dark:
    roles:
      background: pink-1-dark
      surface: pink-2-dark
      surface-elevated: pink-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: pink-9-dark
      primary: pink-9-dark
      primary-hover: pink-10-dark
      accent: pink-8-dark
      accent-hover: pink-7-dark
      warning: pink-9-dark
      warning-hover: pink-10-dark
      error: pink-12-dark
      success: pink-9-dark
