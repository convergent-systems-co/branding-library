kind: palette
id: material-2
version: 1.0.0
name: Material 2 (Material Design Baseline)
description: >
  The original Material Design baseline color system (2014). 19 color
  families, each with shades 50–900 plus four accent values (A100–A700)
  where applicable. The de facto reference for any Google-flavored or
  Material-influenced product before 2022.
tags: [material, google, baseline, swatch-palette]

provenance:
  source: https://github.com/material-components/material-components-web/blob/master/packages/mdc-theme/_color-palette.scss
  license: Apache-2.0
  attribution: >
    Material Design color palette, Copyright Google Inc., licensed under
    Apache License 2.0.
  importedDate: 2026-05-15

