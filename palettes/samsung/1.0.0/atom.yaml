kind: palette
id: samsung
version: 1.0.0
name: Samsung
description: >
  Samsung's corporate palette is anchored on the deep "Samsung Blue"
  (#1428A0) — the wordmark color and the only chromatic primary on
  the parent identity. The supporting palette declared on
  samsung.com is a tight monochrome ramp from white through neutral
  greys to near-black (#1C1C1C), plus a small set of action accents:
  a brighter mid-blue (#2189FF / #006BEA) used on CTAs in the dark
  UX25 system, an "Apple-grey" cool neutral (#6E6E73) for tertiary
  text on the global US page, plus state colors (success green
  #007E3B, error red #EF3434, warning orange #F66700).

tags: [samsung, hardware, consumer-electronics, blue, monochrome]

provenance:
  source: https://www.samsung.com/us/
  license: Proprietary — All Rights Reserved
  attribution: >
    Samsung Electronics Co., Ltd. — palette values captured from
    the deployed stylesheet on samsung.com (us.css, ux25 base CSS,
    and inline declarations on the US homepage). Samsung, the
    Samsung logo, Galaxy, Bespoke, SamsungOne, and Samsung Sharp
    Sans are trademarks of Samsung Electronics Co., Ltd.
  importedDate: 2026-05-18
  notes: >
    Derived from live site CSS at https://www.samsung.com/us/ on
    2026-05-18; the published brand-identity guide at
    samsung.com/global/about-us/brand-identity/ returns 403 to
    non-browser clients. The corporate Samsung Blue (#1428A0) is
    declared on the live stylesheet and matches the Pantone 2748
    specification long associated with the wordmark. The
    proprietary brand typefaces (SamsungOne, SamsungSharpSans)
    are declared on samsung.com via @font-face but are not
    publicly distributed.

swatches:
  # ─── Samsung Blue (signature) ───────────────────────────────
  - id: samsung-blue
    name: Samsung Blue
    value: "#1428A0"
    description: >
      The signature Samsung wordmark blue. The brand's identity
      color and the only chromatic primary on the parent mark.

  # ─── Action blues (CTAs, dark UX25) ─────────────────────────
  - id: action-blue
    name: Action Blue
    value: "#2189FF"
    description: >
      Brighter action blue used on CTAs in the UX25 dark UI —
      higher contrast on dark surfaces than the corporate blue.
  - id: action-blue-pressed
    name: Action Blue (Pressed)
    value: "#006BEA"
    description: Pressed / hover variant of Action Blue.
  - id: link-blue
    name: Link Blue
    value: "#0381FE"
    description: Inline link color on the white canvas.
  - id: light-blue
    name: Light Blue
    value: "#68AEFF"
    description: Light blue secondary; muted hover affordance.
  - id: legacy-navy
    name: Legacy Navy
    value: "#0C4DA2"
    description: >
      Older Samsung navy still present on US legacy templates;
      a softer mid-navy than the corporate #1428A0.

  # ─── Monochrome canvas ──────────────────────────────────────
  - id: white
    name: White
    value: "#FFFFFF"
    description: Default page canvas; reverse wordmark fill.
  - id: gray-50
    name: Gray 50
    value: "#F7F7F7"
    description: Light page surface tint.
  - id: gray-100
    name: Gray 100
    value: "#F4F4F4"
    description: Subtle elevated surface.
  - id: gray-200
    name: Gray 200
    value: "#E7E7E7"
    description: Quiet rule / border on the white canvas.
  - id: gray-300
    name: Gray 300
    value: "#CBCBCB"
    description: Mid-light gray; disabled borders.
  - id: gray-400
    name: Gray 400
    value: "#8F8F8F"
    description: Mid-gray for inactive controls.
  - id: gray-500
    name: Gray 500
    value: "#757575"
    description: Tertiary text on the white canvas.
  - id: gray-600
    name: Gray 600
    value: "#6E6E73"
    description: >
      Cool secondary text — the value declared inline on the
      samsung.com US homepage.
  - id: gray-700
    name: Gray 700
    value: "#363636"
    description: Elevated dark surface on the UX25 dark canvas.
  - id: gray-800
    name: Gray 800
    value: "#313131"
    description: Dark surface; near-canvas in UX25 dark UI.
  - id: gray-900
    name: Gray 900
    value: "#1C1C1C"
    description: Near-black; canvas in UX25 dark UI.
  - id: black
    name: Black
    value: "#000000"
    description: Primary text on light surfaces; logo fill in mono.

  # ─── State colors ───────────────────────────────────────────
  - id: success
    name: Success
    value: "#007E3B"
    description: Confirmation / success state color.
  - id: warning
    name: Warning
    value: "#F66700"
    description: Warning / caution state color.
  - id: error
    name: Error
    value: "#EF3434"
    description: Error / destructive state color.

modes:
  light:
    roles:
      background: white
      surface: gray-50
      surface-elevated: white
      text-primary: black
      text-secondary: gray-600
      text-tertiary: gray-500
      primary: samsung-blue
      primary-hover: legacy-navy
      accent: link-blue
      accent-hover: action-blue-pressed
      success: success
      warning: warning
      error: error
      border: gray-200
  dark:
    roles:
      background: gray-900
      surface: gray-800
      surface-elevated: gray-700
      text-primary: white
      text-secondary: gray-300
      text-tertiary: gray-400
      primary: action-blue
      primary-hover: action-blue-pressed
      accent: light-blue
      accent-hover: action-blue
      success: success
      warning: warning
      error: error
      border: gray-700
