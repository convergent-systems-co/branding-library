kind: palette
id: gruvbox
version: 1.0.0
name: Gruvbox
description: >
  Retro-groove color scheme by morhetz. Warm, low-saturation earth tones
  organized into dark and light symmetric ramps (dark0..dark4, light0..
  light4) plus three intensity tiers of seven accents (bright, neutral,
  faded). Designed for prolonged reading with reduced eyestrain.

  Dark mode uses dark0..dark4 as the canvas ramp with bright accents.
  Light mode uses light0..light4 and pairs with faded accents for warm
  paper-like contrast.
tags: [gruvbox, editor, retro, warm, dual-mode]

provenance:
  source: https://github.com/morhetz/gruvbox/blob/master/colors/gruvbox.vim
  license: MIT
  attribution: Gruvbox by Pavel Pertsev (morhetz) — github.com/morhetz/gruvbox
  importedDate: 2026-05-17
  notes: >
    Hex values extracted directly from the s:gb dictionary assignments
    in gruvbox.vim. Three accent tiers (bright/neutral/faded) ship
    upstream; dark mode uses bright, light mode uses faded — per
    morhetz's relative-color mapping logic in the same file.

swatches:
