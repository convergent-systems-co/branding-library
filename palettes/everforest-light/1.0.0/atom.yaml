kind: palette
id: everforest-light
version: 1.0.0
name: Everforest Light
description: >
  Sainnhe's Everforest — light variant at medium contrast. Warm cream
  background with muted, slightly desaturated accents. Pairs visually
  with everforest-dark.
tags: [dev-theme, light, modern, everforest, soft]

provenance:
  source: https://github.com/sainnhe/everforest
  license: MIT
  attribution: Everforest by sainnhe (sainnhe/everforest)
  importedDate: 2026-05-17

