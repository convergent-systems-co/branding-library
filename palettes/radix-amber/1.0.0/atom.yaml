kind: palette
id: radix-amber
version: 1.0.0
name: Radix Amber
description: >
  Radix UI's amber scale — 12 semantically labeled steps published in
  both light and dark variants. A warm yellow-orange. Useful for warnings and highlights. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, warm, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Amber is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: amber-1-light
    name: Amber 1 (light)
    value: "#FEFDFB"
    description: App background.
  - id: amber-2-light
    name: Amber 2 (light)
    value: "#FEFBE9"
    description: Subtle background.
  - id: amber-3-light
    name: Amber 3 (light)
    value: "#FFF7C2"
    description: UI element background.
  - id: amber-4-light
    name: Amber 4 (light)
    value: "#FFEE9C"
    description: Hovered UI element background.
  - id: amber-5-light
    name: Amber 5 (light)
    value: "#FBE577"
    description: Active / selected UI element background.
  - id: amber-6-light
    name: Amber 6 (light)
    value: "#F3D673"
    description: Subtle borders and separators.
  - id: amber-7-light
    name: Amber 7 (light)
    value: "#E9C162"
    description: UI element border and focus rings.
  - id: amber-8-light
    name: Amber 8 (light)
    value: "#E2A336"
    description: Hovered UI element border.
  - id: amber-9-light
    name: Amber 9 (light)
    value: "#FFC53D"
    description: Solid background — the brand color step.
  - id: amber-10-light
    name: Amber 10 (light)
    value: "#FFBA18"
    description: Hovered solid background.
  - id: amber-11-light
    name: Amber 11 (light)
    value: "#AB6400"
    description: Low-contrast text.
  - id: amber-12-light
    name: Amber 12 (light)
    value: "#4F3422"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: amber-1-dark
    name: Amber 1 (dark)
    value: "#16120C"
    description: App background.
  - id: amber-2-dark
    name: Amber 2 (dark)
    value: "#1D180F"
    description: Subtle background.
  - id: amber-3-dark
    name: Amber 3 (dark)
    value: "#302008"
    description: UI element background.
  - id: amber-4-dark
    name: Amber 4 (dark)
    value: "#3F2700"
    description: Hovered UI element background.
  - id: amber-5-dark
    name: Amber 5 (dark)
    value: "#4D3000"
    description: Active / selected UI element background.
  - id: amber-6-dark
    name: Amber 6 (dark)
    value: "#5C3D05"
    description: Subtle borders and separators.
  - id: amber-7-dark
    name: Amber 7 (dark)
    value: "#714F19"
    description: UI element border and focus rings.
  - id: amber-8-dark
    name: Amber 8 (dark)
    value: "#8F6424"
    description: Hovered UI element border.
  - id: amber-9-dark
    name: Amber 9 (dark)
    value: "#FFC53D"
    description: Solid background — the brand color step.
  - id: amber-10-dark
    name: Amber 10 (dark)
    value: "#FFD60A"
    description: Hovered solid background.
  - id: amber-11-dark
    name: Amber 11 (dark)
    value: "#FFCA16"
    description: Low-contrast text.
  - id: amber-12-dark
    name: Amber 12 (dark)
    value: "#FFE7B3"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: amber-1-light
      surface: amber-2-light
      surface-elevated: amber-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: amber-9-light
      primary: amber-9-light
      primary-hover: amber-10-light
      accent: amber-8-light
      accent-hover: amber-7-light
      warning: amber-9-light
      warning-hover: amber-10-light
      error: amber-12-light
      success: amber-9-light
  dark:
    roles:
      background: amber-1-dark
      surface: amber-2-dark
      surface-elevated: amber-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: amber-9-dark
      primary: amber-9-dark
      primary-hover: amber-10-dark
      accent: amber-8-dark
      accent-hover: amber-7-dark
      warning: amber-9-dark
      warning-hover: amber-10-dark
      error: amber-12-dark
      success: amber-9-dark
