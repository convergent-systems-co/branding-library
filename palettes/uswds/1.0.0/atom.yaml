modes:
  light:
    roles:
      background: gray-1
      surface: gray-3
      surface-elevated: gray-1
      text-primary: gray-90
      text-secondary: gray-70
      text-tertiary: gray-50
      primary: blue-50
      primary-hover: blue-70
      accent: indigo-vivid-60
      accent-hover: indigo-vivid-70
      warning: yellow-30
      warning-hover: yellow-50
      error: red-50
      success: green-50
      border: gray-30

  dark:
    roles:
      background: gray-90
      surface: gray-80
      surface-elevated: gray-70
      text-primary: gray-1
      text-secondary: gray-20
      text-tertiary: gray-30
      primary: blue-vivid-30
      primary-hover: blue-vivid-20
      accent: indigo-vivid-30
      accent-hover: indigo-vivid-20
      warning: yellow-vivid-20
      warning-hover: yellow-vivid-10
      error: red-vivid-30
      success: green-vivid-30
      border: gray-70
