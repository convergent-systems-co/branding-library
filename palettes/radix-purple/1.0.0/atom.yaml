kind: palette
id: radix-purple
version: 1.0.0
name: Radix Purple
description: >
  Radix UI's purple scale — 12 semantically labeled steps published in
  both light and dark variants. A balanced red-violet, the canonical purple. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Purple is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: purple-1-light
    name: Purple 1 (light)
    value: "#FEFCFE"
    description: App background.
  - id: purple-2-light
    name: Purple 2 (light)
    value: "#FBF7FE"
    description: Subtle background.
  - id: purple-3-light
    name: Purple 3 (light)
    value: "#F7EDFE"
    description: UI element background.
  - id: purple-4-light
    name: Purple 4 (light)
    value: "#F2E2FC"
    description: Hovered UI element background.
  - id: purple-5-light
    name: Purple 5 (light)
    value: "#EAD5F9"
    description: Active / selected UI element background.
  - id: purple-6-light
    name: Purple 6 (light)
    value: "#E0C4F4"
    description: Subtle borders and separators.
  - id: purple-7-light
    name: Purple 7 (light)
    value: "#D1AFEC"
    description: UI element border and focus rings.
  - id: purple-8-light
    name: Purple 8 (light)
    value: "#BE93E4"
    description: Hovered UI element border.
  - id: purple-9-light
    name: Purple 9 (light)
    value: "#8E4EC6"
    description: Solid background — the brand color step.
  - id: purple-10-light
    name: Purple 10 (light)
    value: "#8347B9"
    description: Hovered solid background.
  - id: purple-11-light
    name: Purple 11 (light)
    value: "#8145B5"
    description: Low-contrast text.
  - id: purple-12-light
    name: Purple 12 (light)
    value: "#402060"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: purple-1-dark
    name: Purple 1 (dark)
    value: "#18111B"
    description: App background.
  - id: purple-2-dark
    name: Purple 2 (dark)
    value: "#1E1523"
    description: Subtle background.
  - id: purple-3-dark
    name: Purple 3 (dark)
    value: "#301C3B"
    description: UI element background.
  - id: purple-4-dark
    name: Purple 4 (dark)
    value: "#3D224E"
    description: Hovered UI element background.
  - id: purple-5-dark
    name: Purple 5 (dark)
    value: "#48295C"
    description: Active / selected UI element background.
  - id: purple-6-dark
    name: Purple 6 (dark)
    value: "#54346B"
    description: Subtle borders and separators.
  - id: purple-7-dark
    name: Purple 7 (dark)
    value: "#664282"
    description: UI element border and focus rings.
  - id: purple-8-dark
    name: Purple 8 (dark)
    value: "#8457AA"
    description: Hovered UI element border.
  - id: purple-9-dark
    name: Purple 9 (dark)
    value: "#8E4EC6"
    description: Solid background — the brand color step.
  - id: purple-10-dark
    name: Purple 10 (dark)
    value: "#9A5CD0"
    description: Hovered solid background.
  - id: purple-11-dark
    name: Purple 11 (dark)
    value: "#D19DFF"
    description: Low-contrast text.
  - id: purple-12-dark
    name: Purple 12 (dark)
    value: "#ECD9FA"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: purple-1-light
      surface: purple-2-light
      surface-elevated: purple-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: purple-9-light
      primary: purple-9-light
      primary-hover: purple-10-light
      accent: purple-8-light
      accent-hover: purple-7-light
      warning: purple-9-light
      warning-hover: purple-10-light
      error: purple-12-light
      success: purple-9-light
  dark:
    roles:
      background: purple-1-dark
      surface: purple-2-dark
      surface-elevated: purple-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: purple-9-dark
      primary: purple-9-dark
      primary-hover: purple-10-dark
      accent: purple-8-dark
      accent-hover: purple-7-dark
      warning: purple-9-dark
      warning-hover: purple-10-dark
      error: purple-12-dark
      success: purple-9-dark
