  source: https://github.com/carbon-design-system/carbon/blob/main/packages/colors/src/colors.ts
  license: Apache-2.0
  attribution: >
    IBM Carbon Design System colors, Copyright IBM Corp. 2018, 2026,
    licensed under Apache-2.0. Hex values mirrored from
    @carbon/colors source.
  importedDate: 2026-05-17
  importedFromVersion: "@carbon/colors@11.51.0"

