kind: palette
id: carbon
version: 1.0.0
name: IBM Carbon
description: >
  The IBM Carbon Design System color palette. Twelve scale families
  (gray, cool gray, warm gray, red, magenta, purple, blue, cyan, teal,
  green, yellow, orange) plus black and white. Each color family ships
  ten stops at 10..100 in factors of ten — 10 is the lightest, 100 the
  deepest.

  Light mode (Carbon "White" / "g10" themes) uses gray-10 for the page
  canvas; dark mode (Carbon "g90" / "g100" themes) uses gray-100 / gray-90.
  Blue 60 is the canonical primary interactive color across all themes.

tags: [design-system, ibm, carbon, role-based]

