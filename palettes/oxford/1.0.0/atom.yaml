kind: palette
id: oxford
version: 1.0.0
name: Oxford
description: >
  The University of Oxford brand palette as published in the
  Oxford visual identity guidelines. The institutional anchor is
  Oxford Blue (#002147 — Pantone 282), the colour the University
  has been identified by worldwide for centuries. A secondary
  palette of named "Oxford" colours (cerulean blue, lemon yellow,
  charcoal, mauve, peach, potter's pink, dusk, lilac, sienna)
  supports layouts and editorial accents, with a five-stop
  neutral set (ash grey, umber, stone grey, shell grey, off
  white) used selectively alongside the core.

tags: [oxford, university, education, oxford-blue, heritage, conservative-institutional, light-first]

provenance:
  source: https://www.ox.ac.uk/about/the-university/brand/guidelines
  license: Proprietary — All Rights Reserved (Oxford trademarks)
  attribution: >
    The Chancellor, Masters, and Scholars of the University of
    Oxford — palette captured from the University of Oxford
    visual identity guidelines (ox.ac.uk/about/the-university/brand).
    "Oxford," "University of Oxford," the Oxford coat of arms,
    and the belted-crest mark are protected marks of the
    University of Oxford.
  importedDate: 2026-05-19
  notes: >
    Oxford Blue (#002147 = Pantone 282) is the canonical
    institutional value documented across the University's brand
    guidelines and corroborated by the Wikipedia Oxford Blue
    entry. The secondary palette swatches and neutral set are
    captured from the published Oxford brand guidance via the
    central university brand resources. Secondary colours should
    be used selectively and always in combination with the core
    Oxford Blue.

