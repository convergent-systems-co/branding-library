kind: palette
id: radix-crimson
version: 1.0.0
name: Radix Crimson
description: >
  Radix UI's crimson scale — 12 semantically labeled steps published in
  both light and dark variants. A vibrant red-pink, slightly cooler than red. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, warm, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Crimson is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: crimson-1-light
    name: Crimson 1 (light)
    value: "#FFFCFD"
    description: App background.
  - id: crimson-2-light
    name: Crimson 2 (light)
    value: "#FEF7F9"
    description: Subtle background.
  - id: crimson-3-light
    name: Crimson 3 (light)
    value: "#FFE9F0"
    description: UI element background.
  - id: crimson-4-light
    name: Crimson 4 (light)
    value: "#FEDCE7"
    description: Hovered UI element background.
  - id: crimson-5-light
    name: Crimson 5 (light)
    value: "#FACEDD"
    description: Active / selected UI element background.
  - id: crimson-6-light
    name: Crimson 6 (light)
    value: "#F3BED1"
    description: Subtle borders and separators.
  - id: crimson-7-light
    name: Crimson 7 (light)
    value: "#EAACC3"
    description: UI element border and focus rings.
  - id: crimson-8-light
    name: Crimson 8 (light)
    value: "#E093B2"
    description: Hovered UI element border.
  - id: crimson-9-light
    name: Crimson 9 (light)
    value: "#E93D82"
    description: Solid background — the brand color step.
  - id: crimson-10-light
    name: Crimson 10 (light)
    value: "#DF3478"
    description: Hovered solid background.
  - id: crimson-11-light
    name: Crimson 11 (light)
    value: "#CB1D63"
    description: Low-contrast text.
  - id: crimson-12-light
    name: Crimson 12 (light)
    value: "#621639"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: crimson-1-dark
    name: Crimson 1 (dark)
    value: "#191114"
    description: App background.
  - id: crimson-2-dark
    name: Crimson 2 (dark)
    value: "#201318"
    description: Subtle background.
  - id: crimson-3-dark
    name: Crimson 3 (dark)
    value: "#381525"
    description: UI element background.
  - id: crimson-4-dark
    name: Crimson 4 (dark)
    value: "#4D122F"
    description: Hovered UI element background.
  - id: crimson-5-dark
    name: Crimson 5 (dark)
    value: "#5C1839"
    description: Active / selected UI element background.
  - id: crimson-6-dark
    name: Crimson 6 (dark)
    value: "#6D2545"
    description: Subtle borders and separators.
  - id: crimson-7-dark
    name: Crimson 7 (dark)
    value: "#873356"
    description: UI element border and focus rings.
  - id: crimson-8-dark
    name: Crimson 8 (dark)
    value: "#B0436E"
    description: Hovered UI element border.
  - id: crimson-9-dark
    name: Crimson 9 (dark)
    value: "#E93D82"
    description: Solid background — the brand color step.
  - id: crimson-10-dark
    name: Crimson 10 (dark)
    value: "#EE518A"
    description: Hovered solid background.
  - id: crimson-11-dark
    name: Crimson 11 (dark)
    value: "#FF92AD"
    description: Low-contrast text.
  - id: crimson-12-dark
    name: Crimson 12 (dark)
    value: "#FDD3E8"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: crimson-1-light
      surface: crimson-2-light
      surface-elevated: crimson-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: crimson-9-light
      primary: crimson-9-light
      primary-hover: crimson-10-light
      accent: crimson-8-light
      accent-hover: crimson-7-light
      warning: crimson-9-light
      warning-hover: crimson-10-light
      error: crimson-12-light
      success: crimson-9-light
  dark:
    roles:
      background: crimson-1-dark
      surface: crimson-2-dark
      surface-elevated: crimson-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: crimson-9-dark
      primary: crimson-9-dark
      primary-hover: crimson-10-dark
      accent: crimson-8-dark
      accent-hover: crimson-7-dark
      warning: crimson-9-dark
      warning-hover: crimson-10-dark
      error: crimson-12-dark
      success: crimson-9-dark
