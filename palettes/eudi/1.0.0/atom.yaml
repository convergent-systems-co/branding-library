kind: palette
id: eudi
version: 1.0.0
name: European Digital Identity
description: >
  The European Digital Identity (EUDI) Wallet is a European
  Commission programme rendered through the institutional Europa
  Component Library (ECL) visual identity. The palette is anchored
  by the European Commission's Branding blue (#004494) and an EC
  Primary blue scale that runs from #051036 (Primary-180) up
  through #D8E0FB (Primary-20), paired with a warm Secondary gold
  scale (Secondary-180 #8F5600 through Secondary-20 #FFF2DE) used
  for ceremonial and editorial accents. Status colours follow the
  ECL feedback set (Info #3860ED, Success #24A148, Warning #F39811,
  Error #DA1E28). Neutrals are the ECL "Dark" trio plus a
  blue-tinted Neutral scale.

tags: [eudi, european-commission, ecl, europa, government, civic, digital-identity, light-first]

provenance:
  source: https://ec.europa.eu/component-library/ec/guidelines/colours/
  license: Proprietary — © European Union
  attribution: >
    Europa Component Library (ECL) — European Commission, ©
    European Union. The ECL is the institutional design system
    that backs European Commission digital surfaces, including
    the EUDI Wallet programme pages. Colour values mirrored from
    the ECL "Colours" guideline page. The European emblem (the
    twelve gold stars on Reflex Blue) and the "European Union"
    name are reserved and their use is governed by EU
    interinstitutional rules.
  importedDate: 2026-05-19
  notes: >
    The EUDI Wallet programme itself does not publish a
    separately-branded palette; it inherits the ECL identity used
    by the European Commission's digital estate. This atom
    captures the ECL Primary / Secondary / Dark / Neutral / Status
    scales plus the canonical Branding blue (#004494). The EU
    flag's "Reflex Blue" / Pantone Yellow values are NOT included
    here because the canonical Pantone-to-RGB mapping is published
    only in the Interinstitutional Style Guide / Graphics Guide
    annexes, which were not fetched as part of this atom's
    provenance; consumers needing flag-grade emblem colours should
    consult those primary sources directly.

