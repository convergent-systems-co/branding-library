modes:
  light:
    roles:
      background: background
      surface: neutral-40
      surface-elevated: white
      text-primary: dark-100
      text-secondary: dark-80
      text-tertiary: dark-60
      primary: branding
      primary-hover: primary-140
      accent: secondary-100
      accent-hover: secondary-140
      warning: warning
      warning-hover: secondary-180
      error: error
      success: success
      border: neutral-100

  dark:
    # ECL does not publish a canonical dark theme; this mapping is a
    # documented inversion using Primary 180 (#051036) as the deep
    # navy canvas and Neutral 60 as the highest-emphasis ink, with
    # the Primary scale flipped so the lighter Primary 60/80 carry
    # the interactive role against the dark canvas.
    roles:
      background: primary-180
      surface: primary-160
      surface-elevated: primary-140
      text-primary: neutral-60
      text-secondary: neutral-100
      text-tertiary: neutral-140
      primary: primary-60
      primary-hover: primary-40
      accent: secondary-100
      accent-hover: secondary-80
      warning: warning
      warning-hover: secondary-120
      error: error
      success: success
      border: primary-140
