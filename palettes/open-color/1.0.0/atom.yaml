modes:
  light:
    roles:
      background: white
      surface: gray-0
      surface-elevated: white
      text-primary: gray-9
      text-secondary: gray-7
      text-tertiary: gray-6
      primary: blue-7
      primary-hover: blue-8
      accent: violet-7
      accent-hover: violet-8
      warning: yellow-7
      warning-hover: yellow-8
      error: red-7
      success: green-7
      border: gray-3

  dark:
    roles:
      background: gray-9
      surface: gray-8
      surface-elevated: gray-7
      text-primary: gray-0
      text-secondary: gray-3
      text-tertiary: gray-5
      primary: blue-4
      primary-hover: blue-3
      accent: violet-4
      accent-hover: violet-3
      warning: yellow-4
      warning-hover: yellow-3
      error: red-4
      success: green-4
      border: gray-7
