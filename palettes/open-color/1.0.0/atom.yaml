kind: palette
id: open-color
version: 1.0.0
name: Open Color
description: >
  Open Color by yeun — a general-purpose UI color scheme of 13 hues
  (gray, red, pink, grape, violet, indigo, blue, cyan, teal, green, lime,
  yellow, orange), each at 10 evenly-spaced stops (0..9), plus pure white
  and black. 132 swatches total.

  Single-source palette: both light- and dark-mode role mappings select
  from the same swatch list. Light mode uses low-stop neutrals for canvas
  and high-stop hues for action color; dark mode uses high-stop neutrals
  for canvas and lower-stop hues for action color to maintain contrast.

tags: [design-system, open-color, scale, role-based]

provenance:
  source: https://github.com/yeun/open-color/blob/master/open-color.yaml
  license: MIT
  attribution: >
    Open Color, Copyright (c) Yeun Park, licensed under MIT. Hex values
    sourced from open-color.json in the canonical repository.
  importedDate: 2026-05-17
  importedFromVersion: open-color@1.9.1

