kind: palette
id: harvard
version: 1.0.0
name: Harvard
description: >
  The Harvard University brand palette as published in the
  Harvard SEAS brand style guide (the most accessible
  authoritative source for Harvard's core institutional Crimson
  and supporting palette). Crimson (#A51C30) is the dominant
  institutional colour; the core palette adds saturated reds,
  greens, blues, yellows, turquoises, and purples that pair with
  Crimson and Black to produce the editorial voice across
  Harvard's many surfaces.

tags: [harvard, university, education, crimson, conservative-institutional, light-first]

provenance:
  source: https://seas.harvard.edu/office-communications/brand-style-guide/color-palette
  license: Proprietary — All Rights Reserved (Harvard trademarks)
  attribution: >
    The President and Fellows of Harvard College — palette
    captured from the Harvard John A. Paulson School of
    Engineering and Applied Sciences brand-style colour palette
    page, which publishes the institutional Crimson (#A51C30)
    consistent with Harvard's central trademark guidance.
    "Harvard," "Veritas," the Harvard shield, and the Harvard
    wordmark are registered trademarks of the President and
    Fellows of Harvard College.
  importedDate: 2026-05-19
  notes: >
    trademark.harvard.edu (the primary central reference cited
    in the task brief) returned HTTP 403 / blocked WebFetch. The
    Harvard SEAS brand-style page publishes Crimson #A51C30 — the
    canonical institutional value used by Harvard's marketing
    and communications work, and consistent with Harvard's
    widely-cited brand colour code. Crimson is the institutional
    anchor; the core palette colours are documented for editorial
    accent and data-viz, with Harvard's published guidance that
    "Crimson should be the dominant color for materials, with the
    primary color palette providing accents."

swatches:
