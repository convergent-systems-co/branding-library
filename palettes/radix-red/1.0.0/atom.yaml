kind: palette
id: radix-red
version: 1.0.0
name: Radix Red
description: >
  Radix UI's red scale — 12 semantically labeled steps published in
  both light and dark variants. A balanced red suitable for error states and warm actions. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, warm, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-17
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Red is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: red-1-light
    name: Red 1 (light)
    value: "#FFFCFC"
    description: App background.
  - id: red-2-light
    name: Red 2 (light)
    value: "#FFF7F7"
    description: Subtle background.
  - id: red-3-light
    name: Red 3 (light)
    value: "#FEEBEC"
    description: UI element background.
  - id: red-4-light
    name: Red 4 (light)
    value: "#FFDBDC"
    description: Hovered UI element background.
  - id: red-5-light
    name: Red 5 (light)
    value: "#FFCDCE"
    description: Active / selected UI element background.
  - id: red-6-light
    name: Red 6 (light)
    value: "#FDBDBE"
    description: Subtle borders and separators.
  - id: red-7-light
    name: Red 7 (light)
    value: "#F4A9AA"
    description: UI element border and focus rings.
  - id: red-8-light
    name: Red 8 (light)
    value: "#EB8E90"
    description: Hovered UI element border.
  - id: red-9-light
    name: Red 9 (light)
    value: "#E5484D"
    description: Solid background — the brand color step.
  - id: red-10-light
    name: Red 10 (light)
    value: "#DC3E42"
    description: Hovered solid background.
  - id: red-11-light
    name: Red 11 (light)
    value: "#CE2C31"
    description: Low-contrast text.
  - id: red-12-light
    name: Red 12 (light)
    value: "#641723"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: red-1-dark
    name: Red 1 (dark)
    value: "#191111"
    description: App background.
  - id: red-2-dark
    name: Red 2 (dark)
    value: "#201314"
    description: Subtle background.
  - id: red-3-dark
    name: Red 3 (dark)
    value: "#3B1219"
    description: UI element background.
  - id: red-4-dark
    name: Red 4 (dark)
    value: "#500F1C"
    description: Hovered UI element background.
  - id: red-5-dark
    name: Red 5 (dark)
    value: "#611623"
    description: Active / selected UI element background.
  - id: red-6-dark
    name: Red 6 (dark)
    value: "#72232D"
    description: Subtle borders and separators.
  - id: red-7-dark
    name: Red 7 (dark)
    value: "#8C333A"
    description: UI element border and focus rings.
  - id: red-8-dark
    name: Red 8 (dark)
    value: "#B54548"
    description: Hovered UI element border.
  - id: red-9-dark
    name: Red 9 (dark)
    value: "#E5484D"
    description: Solid background — the brand color step.
  - id: red-10-dark
    name: Red 10 (dark)
    value: "#EC5D5E"
    description: Hovered solid background.
  - id: red-11-dark
    name: Red 11 (dark)
    value: "#FF9592"
    description: Low-contrast text.
  - id: red-12-dark
    name: Red 12 (dark)
    value: "#FFD1D9"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: red-1-light
      surface: red-2-light
      surface-elevated: red-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: red-9-light
      primary: red-9-light
      primary-hover: red-10-light
      accent: red-8-light
      accent-hover: red-7-light
      warning: red-9-light
      warning-hover: red-10-light
      error: red-12-light
      success: red-9-light
  dark:
    roles:
      background: red-1-dark
      surface: red-2-dark
      surface-elevated: red-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: red-9-dark
      primary: red-9-dark
      primary-hover: red-10-dark
      accent: red-8-dark
      accent-hover: red-7-dark
      warning: red-9-dark
      warning-hover: red-10-dark
      error: red-12-dark
      success: red-9-dark
