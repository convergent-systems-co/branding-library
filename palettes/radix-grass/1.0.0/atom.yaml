kind: palette
id: radix-grass
version: 1.0.0
name: Radix Grass
description: >
  Radix UI's grass scale — 12 semantically labeled steps published in
  both light and dark variants. A balanced natural green, between jade and lime. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Grass is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: grass-1-light
    name: Grass 1 (light)
    value: "#FBFEFB"
    description: App background.
  - id: grass-2-light
    name: Grass 2 (light)
    value: "#F5FBF5"
    description: Subtle background.
  - id: grass-3-light
    name: Grass 3 (light)
    value: "#E9F6E9"
    description: UI element background.
  - id: grass-4-light
    name: Grass 4 (light)
    value: "#DAF1DB"
    description: Hovered UI element background.
  - id: grass-5-light
    name: Grass 5 (light)
    value: "#C9E8CA"
    description: Active / selected UI element background.
  - id: grass-6-light
    name: Grass 6 (light)
    value: "#B2DDB5"
    description: Subtle borders and separators.
  - id: grass-7-light
    name: Grass 7 (light)
    value: "#94CE9A"
    description: UI element border and focus rings.
  - id: grass-8-light
    name: Grass 8 (light)
    value: "#65BA74"
    description: Hovered UI element border.
  - id: grass-9-light
    name: Grass 9 (light)
    value: "#46A758"
    description: Solid background — the brand color step.
  - id: grass-10-light
    name: Grass 10 (light)
    value: "#3E9B4F"
    description: Hovered solid background.
  - id: grass-11-light
    name: Grass 11 (light)
    value: "#2A7E3B"
    description: Low-contrast text.
  - id: grass-12-light
    name: Grass 12 (light)
    value: "#203C25"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: grass-1-dark
    name: Grass 1 (dark)
    value: "#0E1511"
    description: App background.
  - id: grass-2-dark
    name: Grass 2 (dark)
    value: "#141A15"
    description: Subtle background.
  - id: grass-3-dark
    name: Grass 3 (dark)
    value: "#1B2A1E"
    description: UI element background.
  - id: grass-4-dark
    name: Grass 4 (dark)
    value: "#1D3A24"
    description: Hovered UI element background.
  - id: grass-5-dark
    name: Grass 5 (dark)
    value: "#25482D"
    description: Active / selected UI element background.
  - id: grass-6-dark
    name: Grass 6 (dark)
    value: "#2D5736"
    description: Subtle borders and separators.
  - id: grass-7-dark
    name: Grass 7 (dark)
    value: "#366740"
    description: UI element border and focus rings.
  - id: grass-8-dark
    name: Grass 8 (dark)
    value: "#3E7949"
    description: Hovered UI element border.
  - id: grass-9-dark
    name: Grass 9 (dark)
    value: "#46A758"
    description: Solid background — the brand color step.
  - id: grass-10-dark
    name: Grass 10 (dark)
    value: "#53B365"
    description: Hovered solid background.
  - id: grass-11-dark
    name: Grass 11 (dark)
    value: "#71D083"
    description: Low-contrast text.
  - id: grass-12-dark
    name: Grass 12 (dark)
    value: "#C2F0C2"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: grass-1-light
      surface: grass-2-light
      surface-elevated: grass-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: grass-9-light
      primary: grass-9-light
      primary-hover: grass-10-light
      accent: grass-8-light
      accent-hover: grass-7-light
      warning: grass-9-light
      warning-hover: grass-10-light
      error: grass-12-light
      success: grass-9-light
  dark:
    roles:
      background: grass-1-dark
      surface: grass-2-dark
      surface-elevated: grass-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: grass-9-dark
      primary: grass-9-dark
      primary-hover: grass-10-dark
      accent: grass-8-dark
      accent-hover: grass-7-dark
      warning: grass-9-dark
      warning-hover: grass-10-dark
      error: grass-12-dark
      success: grass-9-dark
