kind: palette
id: radix-cyan
version: 1.0.0
name: Radix Cyan
description: >
  Radix UI's cyan scale — 12 semantically labeled steps published in
  both light and dark variants. A bright sky-leaning blue-green, between sky and teal. Step 1 is app background,
  step 9 is the solid brand color, step 12 is high-contrast text.
  The same step number means the same semantic role across light and
  dark, with different hex values per mode.
tags: [radix, cool, design-system, scale, dual-mode]

provenance:
  source: https://www.radix-ui.com/colors/docs/palette-composition/scales
  license: MIT
  attribution: >
    Radix Colors, Copyright WorkOS, Inc., MIT licensed. Imported from
    the radix-ui/colors repository on GitHub.
  importedDate: 2026-05-18
  importedFromVersion: "3.0.0"
  notes: >
    Radix publishes distinct hex values for each scale in light and dark mode. This atom carries both as -light and -dark suffixed swatches; modes.light.roles points at -light swatches and modes.dark.roles at -dark swatches. Cyan is a chromatic hue and makes a poor neutral for body text, so steps 11 and 12 of Radix Slate are imported as supplementary swatches and used for text-primary and text-secondary in both modes.

swatches:
  # ─── Light-mode steps ──────────────────────────────────────────
  - id: cyan-1-light
    name: Cyan 1 (light)
    value: "#FAFDFE"
    description: App background.
  - id: cyan-2-light
    name: Cyan 2 (light)
    value: "#F2FAFB"
    description: Subtle background.
  - id: cyan-3-light
    name: Cyan 3 (light)
    value: "#DEF7F9"
    description: UI element background.
  - id: cyan-4-light
    name: Cyan 4 (light)
    value: "#CAF1F6"
    description: Hovered UI element background.
  - id: cyan-5-light
    name: Cyan 5 (light)
    value: "#B5E9F0"
    description: Active / selected UI element background.
  - id: cyan-6-light
    name: Cyan 6 (light)
    value: "#9DDDE7"
    description: Subtle borders and separators.
  - id: cyan-7-light
    name: Cyan 7 (light)
    value: "#7DCEDC"
    description: UI element border and focus rings.
  - id: cyan-8-light
    name: Cyan 8 (light)
    value: "#3DB9CF"
    description: Hovered UI element border.
  - id: cyan-9-light
    name: Cyan 9 (light)
    value: "#00A2C7"
    description: Solid background — the brand color step.
  - id: cyan-10-light
    name: Cyan 10 (light)
    value: "#0797B9"
    description: Hovered solid background.
  - id: cyan-11-light
    name: Cyan 11 (light)
    value: "#107D98"
    description: Low-contrast text.
  - id: cyan-12-light
    name: Cyan 12 (light)
    value: "#0D3C48"
    description: High-contrast text.
  # ─── Dark-mode steps ───────────────────────────────────────────
  - id: cyan-1-dark
    name: Cyan 1 (dark)
    value: "#0B161A"
    description: App background.
  - id: cyan-2-dark
    name: Cyan 2 (dark)
    value: "#101B20"
    description: Subtle background.
  - id: cyan-3-dark
    name: Cyan 3 (dark)
    value: "#082C36"
    description: UI element background.
  - id: cyan-4-dark
    name: Cyan 4 (dark)
    value: "#003848"
    description: Hovered UI element background.
  - id: cyan-5-dark
    name: Cyan 5 (dark)
    value: "#004558"
    description: Active / selected UI element background.
  - id: cyan-6-dark
    name: Cyan 6 (dark)
    value: "#045468"
    description: Subtle borders and separators.
  - id: cyan-7-dark
    name: Cyan 7 (dark)
    value: "#12677E"
    description: UI element border and focus rings.
  - id: cyan-8-dark
    name: Cyan 8 (dark)
    value: "#11809C"
    description: Hovered UI element border.
  - id: cyan-9-dark
    name: Cyan 9 (dark)
    value: "#00A2C7"
    description: Solid background — the brand color step.
  - id: cyan-10-dark
    name: Cyan 10 (dark)
    value: "#23AFD0"
    description: Hovered solid background.
  - id: cyan-11-dark
    name: Cyan 11 (dark)
    value: "#4CCCE6"
    description: Low-contrast text.
  - id: cyan-12-dark
    name: Cyan 12 (dark)
    value: "#B6ECF7"
    description: High-contrast text.
  # ─── Neutral text imported from Radix Slate for legibility ─────
  # Body text on a chromatic scale's mid-tone backgrounds reads
  # better in a near-neutral. Radix recommends pairing each
  # chromatic scale with a matching gray scale; slate is the
  # standard pairing for the cooler hues.
  - id: slate-11-light
    name: Slate 11 (light) — neutral text
    value: "#60646C"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-light
    name: Slate 12 (light) — neutral text
    value: "#1C2024"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.
  - id: slate-11-dark
    name: Slate 11 (dark) — neutral text
    value: "#B0B4BA"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 11 is low-contrast text.
  - id: slate-12-dark
    name: Slate 12 (dark) — neutral text
    value: "#EDEEF0"
    description: >
      Neutral text imported from Radix Slate for legibility on the
      chromatic scale's mid-tone backgrounds. Step 12 is high-contrast text.

modes:
  light:
    roles:
      background: cyan-1-light
      surface: cyan-2-light
      surface-elevated: cyan-3-light
      text-primary: slate-12-light
      text-secondary: slate-11-light
      text-tertiary: cyan-9-light
      primary: cyan-9-light
      primary-hover: cyan-10-light
      accent: cyan-8-light
      accent-hover: cyan-7-light
      warning: cyan-9-light
      warning-hover: cyan-10-light
      error: cyan-12-light
      success: cyan-9-light
  dark:
    roles:
      background: cyan-1-dark
      surface: cyan-2-dark
      surface-elevated: cyan-3-dark
      text-primary: slate-12-dark
      text-secondary: slate-11-dark
      text-tertiary: cyan-9-dark
      primary: cyan-9-dark
      primary-hover: cyan-10-dark
      accent: cyan-8-dark
      accent-hover: cyan-7-dark
      warning: cyan-9-dark
      warning-hover: cyan-10-dark
      error: cyan-12-dark
      success: cyan-9-dark
