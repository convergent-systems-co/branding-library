modes:
  light:
    roles:
      background: body-background
      surface: template-background
      surface-elevated: body-background
      text-primary: text
      text-secondary: secondary-text
      text-tertiary: secondary-text
      primary: brand
      primary-hover: link-hover
      accent: focus
      accent-hover: focus
      warning: web-orange
      warning-hover: web-orange
      error: error
      success: success
      border: border

  dark:
    # GOV.UK does not ship an official dark theme — every central
    # government service site uses the light template. This dark
    # mapping is a documented inversion for non-government
    # consumers; the body-background flips to GOV.UK Black with
    # white ink and the focus yellow is preserved (the only colour
    # that legally cannot be substituted on a GOV.UK service surface).
    roles:
      background: text
      surface: text
      surface-elevated: secondary-text
      text-primary: body-background
      text-secondary: border
      text-tertiary: border
      primary: web-blue
      primary-hover: web-blue
      accent: focus
      accent-hover: focus
      warning: web-orange
      warning-hover: web-orange
      error: error
      success: success
      border: secondary-text
