kind: palette
id: govuk
version: 1.0.0
name: GOV.UK Design System
description: >
  The GOV.UK Design System colour palette as published by the
  Government Digital Service (GDS). The palette is built around
  GOV.UK Black (#0B0C0C) for ink and GOV.UK Blue (#1D70B8) for
  the brand link colour, with a yellow focus state (#FFDD00) that
  is the signature accessibility-driven affordance on every UK
  central-government service surface. Functional roles (link,
  link-hover, link-visited, error, success, border, focus,
  template-background, surface) are published alongside an
  11-hue "web palette" (blue, green, teal, purple, magenta, red,
  orange, yellow, brown, black, white) for chart and illustration
  use. Light-first; the system targets WCAG 2.1 AA on the GOV.UK
  template background.

tags: [govuk, gds, design-system, government, civic, light-first, public-sector]

provenance:
  source: https://design-system.service.gov.uk/styles/colour/
  license: MIT (code) / Open Government Licence v3.0 (content)
  attribution: >
    GOV.UK Design System, maintained by the Government Digital
    Service (Cabinet Office, Crown copyright). The govuk-frontend
    codebase is published under the MIT License; the design-system
    guidance content is published under the Open Government Licence
    v3.0. The GOV.UK logotype, the GOV.UK colour pairings, and
    Crown copyright marks are reserved.
  importedDate: 2026-05-19
  notes: >
    Colour values mirrored from the published Colour reference at
    design-system.service.gov.uk/styles/colour. The "web palette"
    eleven-hue set is included alongside the functional roles
    because GOV.UK service teams frequently need chart and
    illustration palettes that already pair with the brand blue
    and focus yellow.

