kind: palette
id: tailwind-css
version: 4.0.0
name: Tailwind CSS - Default Palette
description: "The default Tailwind CSS color palette: 22 hue families x 11 shades (50, 100..900, 950) plus pure white and black. Hex values mirror the Tailwind v3.4.17 release (the last release shipping hex form; v4 expresses identical colors in oklch)."
tags:
  - tailwind
  - utility-first
  - web
  - default
provenance:
  source: https://raw.githubusercontent.com/tailwindlabs/tailwindcss/v3.4.17/src/public/colors.js
  license: MIT
  attribution: Tailwind CSS by Tailwind Labs (github.com/tailwindlabs/tailwindcss)
  importedDate: 2026-05-17
  importedFromVersion: v3.4.17
  notes: Tailwind v4 switched the default palette to oklch() form; values are colorimetrically identical to the v3.4.17 hex form mirrored here. Pinned to a tagged release for reproducibility.
