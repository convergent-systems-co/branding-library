kind: palette
id: github-primer
version: 1.0.0
name: GitHub Primer
description: >
  The GitHub Primer color system extracted from @primer/primitives. Provides
  the canonical "GitHub Light" and "GitHub Dark" themes used across github.com,
  including the full neutral scale (0–13) and eight functional color families
  (blue, green, yellow, orange, red, purple, pink, coral) at ten stops each.

  Light mode uses low-numbered neutrals for backgrounds and high-numbered for
  text; dark mode inverts. Functional scales are tuned per-mode so each role
  has the correct contrast — the blue used for the primary "link" role is a
  deeper blue-5 in light and a brighter blue-3 in dark.

tags: [design-system, github, primer, role-based]

provenance:
  source: https://github.com/primer/primitives/blob/main/src/tokens/base/color/light/light.json5
  license: MIT
  attribution: >
    GitHub Primer Primitives, Copyright (c) GitHub Inc., licensed under MIT.
    Hex values pulled from src/tokens/base/color/light/light.json5 and
    src/tokens/base/color/dark/dark.json5.
  importedDate: 2026-05-17
  importedFromVersion: "@primer/primitives@11.9.0"
  notes: >
    The neutral scale is duplicated per-mode (each mode has its own neutral
    family) so swatches are prefixed with the mode (`light-neutral-N`,
    `dark-neutral-N`) and functional families likewise (`light-blue-N`,
    `dark-blue-N`). The role mappings select the appropriate per-mode swatch.

