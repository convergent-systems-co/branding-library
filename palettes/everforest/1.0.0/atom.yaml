kind: palette
id: everforest
version: 1.0.0
name: Everforest (Hard)
description: >
  Comfortable, pleasant color scheme by sainnhe with a forest-inspired
  green-warm-earth tonality. Designed to be gentle on the eyes during
  long coding sessions. Three contrast tiers ship upstream — hard,
  medium, soft — and this atom captures the hard contrast variant.

  Dark mode is sourced from the dark hard palette; light mode is sourced
  from the light hard palette. Accents are shared across both modes
  (fg-mapped accent colors differ per mode).
tags: [everforest, editor, dual-mode, warm, green, forest]

provenance:
  source: https://github.com/sainnhe/everforest/blob/master/autoload/everforest.vim
  license: MIT
  attribution: Everforest by sainnhe — github.com/sainnhe/everforest
  importedDate: 2026-05-17
  notes: >
    Hex values extracted from the everforest#get_palette function in
    autoload/everforest.vim, specifically the 'hard' branch. Background
    ramp comes from palette1 (bg0..bg5); accents come from palette2.
    The dark and light hard variants ship distinct accent hex values
    upstream — both are captured here.

