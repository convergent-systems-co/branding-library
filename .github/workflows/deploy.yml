name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Workflow-level env so every step sees the Cloudflare context.
# CLOUDFLARE_API_TOKEN is the org-level secret at convergent-systems-co
# so wrangler / wrangler-action pick it up.
env:
  CLOUDFLARE_ACCOUNT_ID: e1fe0f0ce8ff18da4edc118372c30022
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  # Opt every javascript-based action into Node 24 ahead of the
  # 2026-06-02 deprecation of Node 20 on GitHub Actions runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Verify CLOUDFLARE_API_TOKEN secret is set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN secret — set at the convergent-systems-co org level"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate library
        run: pnpm validate

      - name: Build converter outputs
        run: pnpm build

      - name: Build Astro site
        run: cd web && pnpm build

      # wrangler-action@v3 tries `pnpm add wrangler` at the workspace root,
      # which pnpm rejects without -w. wrangler is already a devDep in web/,
      # so we exec it directly via pnpm from there.
      - name: Deploy to Cloudflare Pages
        working-directory: ./web
        run: pnpm exec wrangler pages deploy dist --project-name brand-atoms --branch main
