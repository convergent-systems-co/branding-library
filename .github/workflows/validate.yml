name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt every javascript-based action into Node 24 ahead of the
  # 2026-06-02 deprecation of Node 20 on GitHub Actions runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Validate library
        run: pnpm validate
