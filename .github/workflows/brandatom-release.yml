name: brandatom â€” release

# Cuts a GitHub release with cross-compiled binaries whenever a tag
# matching `brandatom-v*` is pushed, then (when PACKAGE_PUBLISH_TOKEN is set)
# publishes the rendered Homebrew formula and Scoop manifest to the
# canonical taps:
#
#   - convergent-systems-co/homebrew-tap  â†’ Formula/brandatom.rb
#   - convergent-systems-co/scoop-bucket  â†’ bucket/brandatom.json
#
# The PAT must be a fine-grained personal access token with
# Contents: read-and-write on BOTH tap repos (and metadata: read).
# Add it as a repo secret named PACKAGE_PUBLISH_TOKEN. Without it, the
# publish job is skipped â€” the release still gets cut and the
# binaries still land, the user just installs them manually.

on:
  push:
    tags:
      - 'brandatom-v*'

permissions:
  contents: write

env:
  # Opt every javascript-based action into Node 24 ahead of the
  # 2026-06-02 deprecation of Node 20 on GitHub Actions runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: tar.gz
          - os: linux
            arch: arm64
            ext: tar.gz
          - os: darwin
            arch: amd64
            ext: tar.gz
          - os: darwin
            arch: arm64
            ext: tar.gz
          - os: windows
            arch: amd64
            ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: build
        working-directory: src/brandatom
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          out="brandatom"
          if [ "$GOOS" = "windows" ]; then out="brandatom.exe"; fi
          mkdir -p ../../release
          go build -trimpath -ldflags="-s -w" -o "../../release/$out" ./cmd/brandatom

      - name: package
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_EXT: ${{ matrix.ext }}
        working-directory: release
        run: |
          name="brandatom-${MATRIX_OS}-${MATRIX_ARCH}"
          if [ "${MATRIX_EXT}" = "zip" ]; then
            zip "${name}.zip" brandatom.exe
            sha256sum "${name}.zip" | awk '{print $1}' > "${name}.zip.sha256"
            rm brandatom.exe
          else
            tar -czf "${name}.tar.gz" brandatom
            sha256sum "${name}.tar.gz" | awk '{print $1}' > "${name}.tar.gz.sha256"
            rm brandatom
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: brandatom-${{ matrix.os }}-${{ matrix.arch }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: stage assets
        run: |
          mkdir -p staged
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec cp {} staged/ \;
          ls -la staged

      - name: parse version
        id: version
        run: echo "value=${GITHUB_REF_NAME#brandatom-v}" >> "$GITHUB_OUTPUT"

      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          files: staged/*
          generate_release_notes: true
          body: |
            ## brandatom ${{ github.ref_name }}

            Binaries for Linux, macOS, and Windows. Verify with the
            published `.sha256` checksum files.

            ### Install

            **Homebrew:**

            ```sh
            brew install convergent-systems-co/tap/brandatom
            ```

            **Scoop:**

            ```sh
            scoop bucket add convergent-systems-co https://github.com/convergent-systems-co/scoop-bucket
            scoop install brandatom
            ```

            **Manual:** download the archive for your platform,
            extract, and put the `brandatom` binary on your `$PATH`.

  publish-formulae:
    name: publish brew formula + scoop manifest
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.SKIP_PUBLISH_FORMULAE != 'true' }}
    steps:
      - name: skip if PAT missing
        id: guard
        env:
          HAS_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" = "false" ]; then
            echo "::warning::PACKAGE_PUBLISH_TOKEN secret not set â€” skipping cross-repo publish."
            echo "::warning::Add a fine-grained PAT with Contents: read-and-write on"
            echo "::warning::  convergent-systems-co/homebrew-tap"
            echo "::warning::  convergent-systems-co/scoop-bucket"
            echo "::warning::then re-run this workflow (or cut the next tag)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/download-artifact@v8
        if: steps.guard.outputs.skip != 'true'
        with:
          path: artifacts

      - name: collect SHA256s
        id: shas
        if: steps.guard.outputs.skip != 'true'
        run: |
          # Each artifact's .sha256 sibling contains the hex digest produced
          # in the build job.
          find_sha() {
            find artifacts -name "$1" -type f | head -1
          }
          darwin_arm64=$(cat "$(find_sha 'brandatom-darwin-arm64.tar.gz.sha256')")
          darwin_amd64=$(cat "$(find_sha 'brandatom-darwin-amd64.tar.gz.sha256')")
          linux_arm64=$(cat "$(find_sha 'brandatom-linux-arm64.tar.gz.sha256')")
          linux_amd64=$(cat "$(find_sha 'brandatom-linux-amd64.tar.gz.sha256')")
          windows_amd64=$(cat "$(find_sha 'brandatom-windows-amd64.zip.sha256')")
          {
            echo "darwin_arm64=$darwin_arm64"
            echo "darwin_amd64=$darwin_amd64"
            echo "linux_arm64=$linux_arm64"
            echo "linux_amd64=$linux_amd64"
            echo "windows_amd64=$windows_amd64"
          } >> "$GITHUB_OUTPUT"

      - name: render brew formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
          DARWIN_ARM64: ${{ steps.shas.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.shas.outputs.darwin_amd64 }}
          LINUX_ARM64: ${{ steps.shas.outputs.linux_arm64 }}
          LINUX_AMD64: ${{ steps.shas.outputs.linux_amd64 }}
        run: |
          mkdir -p rendered
          sed \
            -e "s|0\\.1\\.0|${VERSION}|g" \
            -e "s|REPLACE_WITH_DARWIN_ARM64_SHA256|${DARWIN_ARM64}|" \
            -e "s|REPLACE_WITH_DARWIN_AMD64_SHA256|${DARWIN_AMD64}|" \
            -e "s|REPLACE_WITH_LINUX_ARM64_SHA256|${LINUX_ARM64}|" \
            -e "s|REPLACE_WITH_LINUX_AMD64_SHA256|${LINUX_AMD64}|" \
            src/brandatom/dist/homebrew/brandatom.rb > rendered/brandatom.rb
          echo "--- rendered formula ---"
          cat rendered/brandatom.rb

      - name: render scoop manifest
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
          WINDOWS_AMD64: ${{ steps.shas.outputs.windows_amd64 }}
        run: |
          # The manifest hash field uses sha256: prefix when it's a checksum;
          # Scoop also accepts a raw hex digest, which we use.
          sed \
            -e "s|0\\.1\\.0|${VERSION}|g" \
            -e "s|REPLACE_WITH_WINDOWS_AMD64_SHA256|${WINDOWS_AMD64}|" \
            src/brandatom/dist/scoop/brandatom.json > rendered/brandatom.json
          echo "--- rendered manifest ---"
          cat rendered/brandatom.json

      - name: push to homebrew-tap
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config --global user.name "brandatom-release-bot"
          git config --global user.email "noreply@convergent-systems.co"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/convergent-systems-co/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp rendered/brandatom.rb tap/Formula/brandatom.rb
          cd tap
          # git add first so the check covers both "new file" and "modified
          # file" â€” `git diff --quiet` alone misses new untracked files and
          # would skip the commit on the very first publish.
          git add Formula/brandatom.rb
          if git diff --cached --quiet; then
            echo "no formula changes â€” already at this version"
          else
            git commit -m "brandatom ${VERSION}: update formula" \
              -m "Triggered by release brandatom-v${VERSION}." \
              -m "Source: convergent-systems-co/branding-library@${GITHUB_SHA}"
            git push origin HEAD
          fi

      - name: push to scoop-bucket
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config --global user.name "brandatom-release-bot"
          git config --global user.email "noreply@convergent-systems.co"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/convergent-systems-co/scoop-bucket.git" bucket
          mkdir -p bucket/bucket
          cp rendered/brandatom.json bucket/bucket/brandatom.json
          cd bucket
          git add bucket/brandatom.json
          if git diff --cached --quiet; then
            echo "no manifest changes â€” already at this version"
          else
            git commit -m "brandatom ${VERSION}: update manifest" \
              -m "Triggered by release brandatom-v${VERSION}." \
              -m "Source: convergent-systems-co/branding-library@${GITHUB_SHA}"
            git push origin HEAD
          fi
