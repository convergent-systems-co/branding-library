kind: font
id: jetbrainsmono-nerdfont
version: 1.0.0
name: JetBrainsMono Nerd Font
description: >
  JetBrains Mono monospaced font with Nerd Fonts glyph augmentation.
  Designed by JetBrains for developers; patched with ~10,000 additional
  icons (Powerline, Material Design Icons, Font Awesome, Devicons,
  Octicons, Codicons, etc.).
family: JetBrainsMono Nerd Font
classification: monospace
tags: [nerd-font, monospace, jetbrains, terminal, ide]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    JetBrains Mono, Copyright 2020 The JetBrains Mono Project Authors
    (https://github.com/JetBrains/JetBrainsMono), licensed under the
    SIL Open Font License, Version 1.1. Nerd Fonts patching by
    Ryan L McIntyre, MIT license.
  importedDate: 2026-05-15
  importedFromVersion: v3.4.0
  notes: >
    Base font version: JetBrains Mono 2.304. Download archive:
    https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/JetBrainsMono.zip

source:
  kind: external
  family: JetBrainsMono Nerd Font
  notes: >
    Nerd-Font-patched build of JetBrains Mono. Not available via Google
    Fonts. Download woff2/ttf files from the Nerd Fonts GitHub release
    and self-host, or install system-wide for terminal/IDE use.

fallbackStack:
  - JetBrains Mono
  - Fira Code
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
