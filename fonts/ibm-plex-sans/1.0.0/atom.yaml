kind: font
id: ibm-plex-sans
version: 1.0.0
name: IBM Plex Sans
description: >
  IBM's neo-grotesque sans-serif designed by Mike Abbink and Bold Monday as the corporate
  typeface for IBM. Balanced, neutral, and engineered for digital and print across IBM's
  global brand system. Excellent body and UI default with broad Latin and CJK coverage.
family: IBM Plex Sans
classification: sans-serif
tags: [ ibm-plex, sans-serif, ui, body, corporate, neo-grotesque ]

provenance:
  source: https://github.com/IBM/plex
  license: OFL-1.1
  attribution: >
    Copyright © 2017 IBM Corp. with Reserved Font Name "Plex". Licensed under the SIL Open Font
    License, Version 1.1. Designed by Mike Abbink and Bold Monday.
  importedDate: 2026-05-17
  importedFromVersion: "@ibm/plex-sans@1.1.0"
  notes: >
    Distributed via the IBM Plex monorepo at github.com/IBM/plex (packages/plex-sans).
    Also published on Google Fonts as "IBM Plex Sans".

source:
  kind: google-fonts
  family: IBM Plex Sans
  url: https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
