kind: font
id: eb-garamond
version: 1.0.0
name: EB Garamond
description: >
  A revival of Claude Garamond's classic old-style serifs based on the Egenolff-Berner specimen of 1592. Variable font (weight 400–800) — pick it for books, theology, philosophy, and any setting that asks for an authoritative classical voice.
family: EB Garamond
classification: serif
tags: [ variable-font, old-style, classical, book, body ]

provenance:
  source: https://fonts.google.com/specimen/EB+Garamond
  license: OFL-1.1
  attribution: >
    EB Garamond, Copyright 2017 The EB Garamond Project Authors (Georg Duffner, Octavio Pardo), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: EB Garamond
  url: https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap

fallbackStack:
  - Iowan Old Style
  - Apple Garamond
  - Baskerville
  - Times New Roman
  - serif

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 400, max: 800, default: 400 }
