kind: font
id: albert-sans
version: 1.0.0
name: Albert Sans
description: >
  A geometric sans-serif with a low contrast, even rhythm, and a touch of warmth in the curves. Variable font (weight 100–900) with full italic range — pick it for editorial and product surfaces that want geometric clarity without the chill of a strict Bauhaus revival.
family: Albert Sans
classification: sans-serif
tags: [ variable-font, geometric, ui, editorial, modern ]

provenance:
  source: https://fonts.google.com/specimen/Albert+Sans
  license: OFL-1.1
  attribution: >
    Albert Sans, Copyright 2021 The Albert Sans Project Authors (Cyreal), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18

source:
  kind: google-fonts
  family: Albert Sans
  url: https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
