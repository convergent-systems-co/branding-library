kind: font
id: source-sans-3
version: 1.0.0
name: Source Sans 3
description: >
  Adobe's humanist sans-serif, the third generation of the Source family and the first to ship as a variable font. Pick it for UI, technical documentation, and product surfaces that want Adobe-grade neutrality.
family: Source Sans 3
classification: sans-serif
tags: [ variable-font, humanist, ui, body, adobe ]

provenance:
  source: https://fonts.google.com/specimen/Source+Sans+3
  license: OFL-1.1
  attribution: >
    Source Sans 3, Copyright 2010–2020 Adobe (https://www.adobe.com/), with Reserved Font Name "Source", licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: Source Sans 3
  url: https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 200, max: 900, default: 400 }
