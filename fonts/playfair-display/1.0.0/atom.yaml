kind: font
id: playfair-display
version: 1.0.0
name: Playfair Display
description: >
  A high-contrast modern-style serif descended from the rationalist tradition of Bodoni and Didot. Variable font (weight 400–900) — pick it for display headlines, editorial covers, and luxury or fashion brand surfaces.
family: Playfair Display
classification: serif
tags: [ variable-font, modern, high-contrast, display, fashion ]

