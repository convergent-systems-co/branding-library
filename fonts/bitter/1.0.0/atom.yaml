kind: font
id: bitter
version: 1.0.0
name: Bitter
description: >
  A contemporary slab-serif designed specifically for on-screen body text, with a tall x-height and minimal contrast. Variable font (weight 100–900) — pick it for blogs, documentation, and editorial reading where you want slab warmth without losing legibility.
family: Bitter
classification: slab-serif
tags: [ variable-font, slab, screen, body, editorial ]

provenance:
  source: https://fonts.google.com/specimen/Bitter
  license: OFL-1.1
  attribution: >
    Bitter, Copyright 2011 The Bitter Project Authors (Sol Matas, Huerta Tipográfica), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: Bitter
  url: https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap

fallbackStack:
  - Iowan Old Style
  - Apple Garamond
  - Baskerville
  - Times New Roman
  - serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
