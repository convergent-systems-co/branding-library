kind: font
id: cormorant-garamond
version: 1.0.0
name: Cormorant Garamond
description: >
  A delicate, extra-thin reinterpretation of Claude Garamont's sixteenth-century romans, drawn for display sizes where stroke contrast can sing. Pick it for editorial covers, wedding-grade invitations, and luxury surfaces — not for body copy under twenty pixels, where its hairlines disappear.
family: Cormorant Garamond
classification: serif
tags: [ old-style, display, editorial, luxury, high-contrast ]

provenance:
  source: https://fonts.google.com/specimen/Cormorant+Garamond
  license: OFL-1.1
  attribution: >
    Cormorant Garamond, Copyright 2015 The Cormorant Project Authors (Christian Thalmann, Catharsis Fonts), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18
  notes: >
    Static-only family on Google Fonts (five weights plus italics). The broader Cormorant superfamily ships additional optical-size cuts that are not in scope for this atom.

source:
