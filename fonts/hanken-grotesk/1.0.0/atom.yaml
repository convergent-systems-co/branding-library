kind: font
id: hanken-grotesk
version: 1.0.0
name: Hanken Grotesk
description: >
  A neo-grotesque sans-serif with a generous x-height, open apertures, and a steady, screen-friendly rhythm. Variable font (weight 100–900) with matching italics — pick it as a workhorse body and UI face when Inter feels too tight or Roboto too neutral.
family: Hanken Grotesk
classification: sans-serif
tags: [ variable-font, neo-grotesque, ui, body, workhorse ]

provenance:
  source: https://fonts.google.com/specimen/Hanken+Grotesk
  license: OFL-1.1
  attribution: >
    Hanken Grotesk, Copyright 2020 The Hanken Grotesk Project Authors (Alfredo Marco Pradil, Hanken Design Co.), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18

source:
  kind: google-fonts
  family: Hanken Grotesk
  url: https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
