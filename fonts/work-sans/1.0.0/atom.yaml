kind: font
id: work-sans
version: 1.0.0
name: Work Sans
description: >
  A screen-optimized sans-serif loosely based on early grotesques and tuned for on-screen text. Variable font (weight 100–900) — pick it when you want a clean grotesque body face that holds up across UI and long-form reading.
family: Work Sans
classification: sans-serif
tags: [ variable-font, grotesque, screen, ui, body ]

provenance:
  source: https://fonts.google.com/specimen/Work+Sans
  license: OFL-1.1
  attribution: >
    Work Sans, Copyright 2015 The Work Sans Project Authors (Wei Huang), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: Work Sans
  url: https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
