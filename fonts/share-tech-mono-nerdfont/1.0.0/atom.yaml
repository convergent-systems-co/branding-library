kind: font
id: share-tech-mono-nerdfont
version: 1.0.0
name: Share Tech Mono Nerd Font
description: >
  Share Tech Mono with Nerd Fonts glyph augmentation. A geometric, slightly futuristic monospace from Carrois Apostrophe — designed for technical interfaces and dashboards where character feels as important as legibility. Patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: ShureTechMono Nerd Font
classification: monospace
tags: [ nerd-font, monospace, futuristic, terminal, technical ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Share Tech Mono, Copyright 2012 The Share Tech Mono Project Authors (Carrois Apostrophe, https://github.com/google/fonts/tree/main/ofl/sharetechmono), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license. Note: the Nerd-Font-patched build is distributed under the family name "ShureTechMono Nerd Font" to avoid trademark issues with "Share Tech Mono".
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Nerd Fonts ships Share Tech Mono as a single Regular weight, matching the upstream which only ever shipped one weight. Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/ShareTechMono.zip

source:
  kind: external
  family: ShureTechMono Nerd Font
  notes: >
    Nerd-Font-patched build of Share Tech Mono (renamed ShureTechMono for distribution). The unpatched Share Tech Mono is available via Google Fonts; the Nerd-Font-patched build is distributed only via the Nerd Fonts GitHub release. Download ttf files and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Share Tech Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
cdnUrls:
  ShureTechMonoNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/share-tech-mono-nerdfont/1.0.0/ShureTechMonoNerdFontMono-Regular.ttf
