kind: font
id: crimson-pro
version: 1.0.0
name: Crimson Pro
description: >
  A book-style old-style serif in the spirit of Crimson Text, redrawn as a variable font (weight 200–900) with a wider feature set and matching italics. Pick it for long-form reading on screen, scholarly publications, and any context where Garamond-family warmth is wanted without the licensing of a Garamond proper.
family: Crimson Pro
classification: serif
tags: [ variable-font, old-style, body, reading, scholarly ]

provenance:
  source: https://fonts.google.com/specimen/Crimson+Pro
  license: OFL-1.1
  attribution: >
    Crimson Pro, Copyright 2018 The Crimson Pro Project Authors (Jacques Le Bailly, based on Crimson Text by Sebastian Kosch), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18

source:
  kind: google-fonts
  family: Crimson Pro
  url: https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap

fallbackStack:
  - Iowan Old Style
  - Charter
  - Georgia
  - Times New Roman
  - serif

availableStyles:
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 200, max: 900, default: 400 }
