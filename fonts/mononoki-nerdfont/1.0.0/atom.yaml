kind: font
id: mononoki-nerdfont
version: 1.0.0
name: Mononoki Nerd Font
description: >
  Mononoki by Matthias Tellen — a distinctive, lightly curved monospaced typeface designed
  to reduce eye fatigue during long coding sessions — with Nerd Fonts glyph augmentation
  (~10,000 icons: Powerline, MDI, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: Mononoki Nerd Font
classification: monospace
tags: [ nerd-font, mononoki, monospace, code, terminal ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: (OFL-1.1 AND MIT)
  attribution: >
    Mononoki, Copyright © 2013–2016 Matthias Tellen (matthias.tellen@googlemail.com),
    licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by
    Ryan L McIntyre, MIT license.
  importedDate: 2026-05-17
  importedFromVersion: v3.4.0
  notes: >
    Base font version: mononoki 1.6. Download archive:
    https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/Mononoki.zip

source:
  kind: external
  family: Mononoki Nerd Font
  notes: >
    Nerd-Font-patched build of mononoki. Not available via Google Fonts. Download
    woff2/ttf files from the Nerd Fonts GitHub release and self-host, or install
    system-wide for terminal/editor use.

fallbackStack:
  - mononoki
  - JetBrains Mono
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
