kind: font
id: plus-jakarta-sans
version: 1.0.5
name: Plus Jakarta Sans
description: >
  Plus Jakarta Sans is a geometric humanist sans-serif by Gumpita Rahayu and Tokotype,
  inspired by the cultural identity of Jakarta. Variable weight axis (200–800) with
  matching italics. Popular in modern UI/branding work.
family: Plus Jakarta Sans
classification: sans-serif
tags: [ plus-jakarta, sans-serif, geometric, humanist, variable-font, ui ]

