  source: https://github.com/tokotype/PlusJakartaSans
  license: OFL-1.1
  attribution: >
    Copyright © 2020 The Plus Jakarta Sans Project Authors (Tokotype,
    https://github.com/tokotype/PlusJakartaSans). Licensed under the SIL Open Font License,
    Version 1.1. Designed by Gumpita Rahayu.
  importedDate: 2026-05-17
  importedFromVersion: "1.005"
  notes: >
    Upstream: github.com/tokotype/PlusJakartaSans. Also published on Google Fonts as
    "Plus Jakarta Sans".

source:
  kind: google-fonts
  family: Plus Jakarta Sans
  url: https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap

