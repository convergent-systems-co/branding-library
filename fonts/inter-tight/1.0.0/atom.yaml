kind: font
id: inter-tight
version: 1.0.0
name: Inter Tight
description: >
  A condensed sibling of Inter sharing the same skeleton with tighter sidebearings and shorter ascenders. Variable font (weight 100–900) — pick it when Inter is your body face but headlines need more density per line.
family: Inter Tight
classification: sans-serif
tags: [ variable-font, humanist, condensed, headings, ui ]

provenance:
  source: https://fonts.google.com/specimen/Inter+Tight
  license: OFL-1.1
  attribution: >
    Inter Tight, Copyright 2020 The Inter Project Authors (Rasmus Andersson), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: Inter Tight
  url: https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
