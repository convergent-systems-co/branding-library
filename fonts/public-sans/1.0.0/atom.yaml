kind: font
id: public-sans
version: 1.0.0
name: Public Sans
description: >
  A strong, neutral typeface for U.S. federal government use, the default in the U.S. Web Design System. Variable font (weight 100–900) — pick it for civic, policy, or institutional surfaces that want sober legibility.
family: Public Sans
classification: sans-serif
tags: [ variable-font, neutral, government, civic, body ]

provenance:
  source: https://fonts.google.com/specimen/Public+Sans
  license: OFL-1.1
  attribution: >
    Public Sans, Copyright 2015 The Public Sans Project Authors, licensed under the SIL Open Font License, Version 1.1. Originally derived from Libre Franklin.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: Public Sans
  url: https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
