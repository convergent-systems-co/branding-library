kind: font
id: fraunces
version: 1.0.0
name: Fraunces
description: >
  A variable display serif inspired by mid-century commercial type, with weight, optical size, softness, and a WONK axis that toggles wobblier letterforms. Pick it for editorial covers, marketing headlines, and brand systems that want a distinctive serif voice.
family: Fraunces
classification: serif
tags: [ variable-font, display-serif, editorial, distinctive, marketing ]

provenance:
  source: https://fonts.google.com/specimen/Fraunces
  license: OFL-1.1
  attribution: >
    Fraunces, Copyright 2020 The Fraunces Project Authors (Phaedra Charles, Flavia Zimbardi, Undercase Type), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17
  notes: >
    Fraunces ships custom axes SOFT (softness) and WONK (toggle for "wonky" letterforms) in addition to the standard wght and opsz.

source:
  kind: google-fonts
  family: Fraunces
  url: https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&display=swap

fallbackStack:
  - Iowan Old Style
  - Apple Garamond
  - Baskerville
  - Times New Roman
  - serif

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 100, style: italic }
  - { weight: 200, style: normal }
  - { weight: 200, style: italic }
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
  - { tag: opsz, name: Optical Size, min: 9, max: 144, default: 14 }
  - { tag: SOFT, name: Softness, min: 0, max: 100, default: 0 }
  - { tag: WONK, name: Wonky, min: 0, max: 1, default: 0 }
