kind: font
id: oswald
version: 1.0.0
name: Oswald
description: >
  A reworking of the classic gothic typeface style, redrawn with condensed proportions and tuned for digital screens. Variable font (weight 200–700) — pick it for headlines, navigation, and tabular surfaces that want a strong condensed voice.
family: Oswald
classification: display
tags: [ variable-font, condensed, gothic, headlines, ui ]

provenance:
  source: https://fonts.google.com/specimen/Oswald
  license: OFL-1.1
  attribution: >
    Oswald, Copyright 2016 The Oswald Project Authors (Vernon Adams, Kalapi Gajjar, Cyreal), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-17

source:
  kind: google-fonts
  family: Oswald
  url: https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap

fallbackStack:
  - Impact
  - Haettenschweiler
  - Arial Narrow
  - sans-serif

availableStyles:
  - { weight: 200, style: normal }
  - { weight: 300, style: normal }
  - { weight: 400, style: normal }
  - { weight: 500, style: normal }
  - { weight: 600, style: normal }
  - { weight: 700, style: normal }

variableAxes:
  - { tag: wght, name: Weight, min: 200, max: 700, default: 400 }
