kind: font
id: fira-mono
version: 3.2.0
name: Fira Mono
description: >
  Non-ligature monospaced companion to Fira Sans, designed by Erik Spiekermann, Ralph du
  Carrois, Anja Meiners and Botio Nikoltchev (Carrois Type Design). The original mono on
  which Nikita Prokopov later layered the Fira Code ligatures — distinct from Fira Code.
family: Fira Mono
classification: monospace
tags: [ mozilla, fira, monospace, code, terminal ]

provenance:
  source: https://github.com/mozilla/Fira
  license: OFL-1.1
  attribution: >
    Copyright © 2012–2015, The Mozilla Foundation and Telefonica S.A. with Reserved Font
    Name "Fira". Licensed under the SIL Open Font License, Version 1.1. Designed by
    Erik Spiekermann, Ralph du Carrois, Anja Meiners and Botio Nikoltchev
    (Carrois Type Design, https://www.carrois.com/).
  importedDate: 2026-05-17
  importedFromVersion: "3.206"
  notes: >
    The non-ligature mono — distinct from the Fira Code variant by Nikita Prokopov. Also
    published on Google Fonts as "Fira Mono".

source:
  kind: google-fonts
  family: Fira Mono
  url: https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap

