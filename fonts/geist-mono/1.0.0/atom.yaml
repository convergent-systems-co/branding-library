kind: font
id: geist-mono
version: 1.0.0
name: Geist Mono
description: >
  Geist Mono — the monospaced companion to Geist Sans, designed
  for code and developer interfaces. Fixed-width metrics, screen-
  tuned forms, ligatures off by default. Used in Vercel's docs,
  the v0 UI, and the Geist Design System code samples.
family: Geist Mono
classification: monospace
tags: [variable-font, vercel, geist, monospace, code, open-source]

provenance:
  source: https://github.com/vercel/geist-font
  license: OFL-1.1
  attribution: >
    Geist Mono is Copyright (c) 2023 Vercel, in collaboration with
    Basement Studio. Licensed under the SIL Open Font License,
    Version 1.1.
  importedDate: 2026-05-17
  notes: >
    Companion to Geist Sans; same upstream repository
    (vercel/geist-font) and OFL license. Distributed via the npm
    package `geist` (which exports both Sans and Mono entry points
    for next/font) and via GitHub Releases.

source:
  kind: external
  family: Geist Mono
  cssImportUrl: https://cdn.jsdelivr.net/npm/@fontsource-variable/geist-mono/index.css
  notes: >
    First-party distribution: `geist` npm package, import path
    `geist/font/mono`. The cssImportUrl above points at the
    community @fontsource-variable/geist-mono bundle on jsDelivr
    for raw CSS consumption.

fallbackStack:
  - SFMono-Regular
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - Courier New
  - monospace

availableStyles:
  - { weight: 100, style: normal }
  - { weight: 200, style: normal }
  - { weight: 300, style: normal }
  - { weight: 400, style: normal }
  - { weight: 500, style: normal }
  - { weight: 600, style: normal }
  - { weight: 700, style: normal }
  - { weight: 800, style: normal }
  - { weight: 900, style: normal }

variableAxes:
  - { tag: wght, name: Weight, min: 100, max: 900, default: 400 }
