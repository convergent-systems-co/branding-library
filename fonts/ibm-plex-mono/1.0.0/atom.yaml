kind: font
id: ibm-plex-mono
version: 1.0.0
name: IBM Plex Mono
description: >
  Monospaced companion to IBM Plex Sans/Serif. Engineered for code, terminals, and tabular
  data with distinctive 0/O and 1/l/I disambiguation. The third pillar of the IBM Plex
  brand-system trinity (Sans / Serif / Mono).
family: IBM Plex Mono
classification: monospace
tags: [ ibm-plex, monospace, code, terminal, corporate ]

provenance:
  source: https://github.com/IBM/plex
  license: OFL-1.1
  attribution: >
    Copyright © 2017 IBM Corp. with Reserved Font Name "Plex". Licensed under the SIL Open Font
    License, Version 1.1. Designed by Mike Abbink and Bold Monday.
  importedDate: 2026-05-17
  importedFromVersion: "@ibm/plex-mono@1.1.0"
  notes: >
    Distributed via the IBM Plex monorepo at github.com/IBM/plex (packages/plex-mono).
    Also published on Google Fonts as "IBM Plex Mono".

source:
  kind: google-fonts
  family: IBM Plex Mono
  url: https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap

fallbackStack:
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - Courier New
  - monospace

availableStyles:
