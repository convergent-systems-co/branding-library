kind: font
id: vt323
version: 1.0.0
name: VT323
description: >
  A monospaced revival of the bitmap font of the 1970s DEC VT320 video terminal, redrawn as a TrueType outline that preserves the rasterized look. Single weight only — pick it for terminal-themed surfaces, retro-computing brands, and any context that wants the unmistakable voice of an amber-phosphor CRT.
family: VT323
classification: monospace
tags: [ monospace, retro, terminal, bitmap, crt ]

provenance:
  source: https://fonts.google.com/specimen/VT323
  license: OFL-1.1
  attribution: >
    VT323, Copyright 2012 The VT323 Project Authors (Peter Hull), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18
  notes: >
    Single-weight family. Derived from the DEC VT320 bitmap glyph set; designed to look correct at typical monospace sizes rather than as a continuous variable outline.

source:
  kind: google-fonts
  family: VT323
  url: https://fonts.googleapis.com/css2?family=VT323&display=swap

fallbackStack:
  - Courier New
  - Lucida Console
  - monospace

availableStyles:
  - { weight: 400, style: normal }
