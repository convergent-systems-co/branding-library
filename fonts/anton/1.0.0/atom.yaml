name: Anton
description: >
  A single-weight condensed sans-serif in the lineage of mid-century advertising gothics, with very tight sidebearings and a near-black weight. Pick it for poster-scale headlines, sport and music brand surfaces, and anywhere an unapologetic shouting voice is wanted.
