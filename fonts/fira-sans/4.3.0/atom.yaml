kind: font
id: fira-sans
version: 4.3.0
name: Fira Sans
description: >
  Mozilla's humanist sans-serif, designed by Erik Spiekermann, Ralph du Carrois, Anja Meiners
  and Botio Nikoltchev (Carrois Type Design) originally as the system typeface for Firefox OS.
  Nine weights with matching italics. The default UI/body font for Mozilla's brand.
family: Fira Sans
classification: sans-serif
tags: [ mozilla, fira, sans-serif, ui, body, humanist ]

provenance:
  source: https://github.com/mozilla/Fira
  license: OFL-1.1
  attribution: >
    Copyright © 2012–2015, The Mozilla Foundation and Telefonica S.A. with Reserved Font
    Name "Fira". Licensed under the SIL Open Font License, Version 1.1. Designed by
    Erik Spiekermann, Ralph du Carrois, Anja Meiners and Botio Nikoltchev
    (Carrois Type Design, https://www.carrois.com/).
  importedDate: 2026-05-17
  importedFromVersion: "4.301"
  notes: >
    Upstream: github.com/mozilla/Fira. Also published on Google Fonts as "Fira Sans".

source:
  kind: google-fonts
  family: Fira Sans
  url: https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap

