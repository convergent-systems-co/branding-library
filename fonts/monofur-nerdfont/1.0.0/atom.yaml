kind: font
id: monofur-nerdfont
version: 1.0.0
name: Monofur Nerd Font
description: >
  Monofur monospaced font with Nerd Fonts glyph augmentation. A casual, rounded monospace face originally derived from Tobias B. Köhler's Mofur, suited for relaxed terminal and editor use. Patched with ~10,000 additional icons (Powerline, Material Design Icons, Font Awesome, Devicons, Octicons, Codicons, etc.).
family: Monofur Nerd Font
classification: monospace
tags: [ nerd-font, monospace, casual, rounded, terminal ]

provenance:
  source: https://github.com/ryanoasis/nerd-fonts/releases/tag/v3.4.0
  license: OFL-1.1
  attribution: >
    Monofur, Copyright Tobias B. Köhler (derived from Mofur), licensed under the SIL Open Font License, Version 1.1. Nerd Fonts patching by Ryan L McIntyre, MIT license.
  importedDate: 2026-05-19
  importedFromVersion: v3.4.0
  notes: >
    Download archive: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/Monofur.zip

source:
  kind: external
  family: Monofur Nerd Font
  notes: >
    Nerd-Font-patched build of Monofur. Not available via Google Fonts. Download ttf files from the Nerd Fonts GitHub release and self-host, or install system-wide for terminal/editor use.

fallbackStack:
  - Monofur
  - Menlo
  - Monaco
  - Consolas
  - Liberation Mono
  - monospace

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 700, style: normal }
cdnUrls:
  MonofurNerdFontMono-Regular.ttf: https://cdn.brand-atoms.com/fonts/monofur-nerdfont/1.0.0/MonofurNerdFontMono-Regular.ttf
  MonofurNerdFontMono-Italic.ttf: https://cdn.brand-atoms.com/fonts/monofur-nerdfont/1.0.0/MonofurNerdFontMono-Italic.ttf
  MonofurNerdFontMono-Bold.ttf: https://cdn.brand-atoms.com/fonts/monofur-nerdfont/1.0.0/MonofurNerdFontMono-Bold.ttf
