kind: font
id: zilla-slab
version: 1.0.0
name: Zilla Slab
description: >
  Mozilla's open-source slab-serif, drawn by Typotheque as the corporate face for the post-2017 Mozilla brand system. Five weights with italics — pick it for technical-but-warm marketing surfaces, editorial slab-serif headlines, and anywhere a friendly Rockwell-adjacent voice is wanted.
family: Zilla Slab
classification: slab-serif
tags: [ slab-serif, mozilla, editorial, marketing, brand ]

provenance:
  source: https://fonts.google.com/specimen/Zilla+Slab
  license: OFL-1.1
  attribution: >
    Zilla Slab, Copyright 2017 Mozilla Foundation, drawn by Typotheque (Peter Bil'ak with Nikola Djurek), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18
  notes: >
    Static-only family; ships five weights plus italics. No variable axes upstream.

source:
  kind: google-fonts
  family: Zilla Slab
  url: https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap

fallbackStack:
  - Rockwell
  - Roboto Slab
  - Courier New
  - Georgia
  - serif

availableStyles:
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
