kind: font
id: dm-serif-display
version: 1.0.0
name: DM Serif Display
description: >
  A high-contrast didone display serif with crisp serifs and pronounced ball terminals, drawn from Colophon's Castledown. Single weight with italic — pick it for headlines, editorial covers, and any surface that wants a confident, fashion-magazine voice without the fragility of a true hairline didone.
family: DM Serif Display
classification: serif
tags: [ didone, display, headlines, editorial, high-contrast ]

provenance:
  source: https://fonts.google.com/specimen/DM+Serif+Display
  license: OFL-1.1
  attribution: >
    DM Serif Display, Copyright 2019 Colophon Foundry (drawn by Paul Barnes, Florian Schick, Lukas Schneider) for Google, licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18
  notes: >
    Static-only display family. Ships a single weight (400) with matching italic; design intent is headline use, not body.

source:
  kind: google-fonts
  family: DM Serif Display
  url: https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap

fallbackStack:
  - Didot
  - Bodoni 72
  - Playfair Display
  - Georgia
  - Times New Roman
  - serif

availableStyles:
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
