kind: font
id: figtree
version: 1.0.0
name: Figtree
description: >
  A modern geometric sans-serif with a softened, friendly tone and even color across weights. Variable font (weight 300–900) with matching italics — pick it for product marketing, landing pages, and brand surfaces that want energy without losing legibility.
family: Figtree
classification: sans-serif
tags: [ variable-font, geometric, marketing, brand, friendly ]

provenance:
  source: https://fonts.google.com/specimen/Figtree
  license: OFL-1.1
  attribution: >
    Figtree, Copyright 2022 The Figtree Project Authors (Erik D. Kennedy), licensed under the SIL Open Font License, Version 1.1.
  importedDate: 2026-05-18

source:
  kind: google-fonts
  family: Figtree
  url: https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap

fallbackStack:
  - -apple-system
  - BlinkMacSystemFont
  - Segoe UI
  - Roboto
  - Helvetica Neue
  - Arial
  - sans-serif

availableStyles:
  - { weight: 300, style: normal }
  - { weight: 300, style: italic }
  - { weight: 400, style: normal }
  - { weight: 400, style: italic }
  - { weight: 500, style: normal }
  - { weight: 500, style: italic }
  - { weight: 600, style: normal }
  - { weight: 600, style: italic }
  - { weight: 700, style: normal }
  - { weight: 700, style: italic }
  - { weight: 800, style: normal }
  - { weight: 800, style: italic }
  - { weight: 900, style: normal }
  - { weight: 900, style: italic }

variableAxes:
  - { tag: wght, name: Weight, min: 300, max: 900, default: 400 }
