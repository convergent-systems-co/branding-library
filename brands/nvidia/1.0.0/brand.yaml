id: nvidia
version: 1.0.0
name: NVIDIA
description: >
  NVIDIA Corporation is the silicon company whose GPUs became the
  substrate of modern AI — CUDA on the data-center side, GeForce on
  the consumer side, and Omniverse / DRIVE / Jetson across robotics,
  automotive, and edge. The corporate identity is austere by design:
  the "eye" logomark and NVIDIA wordmark sit in pure monochrome,
  with a single chromatic exception — the signature NVIDIA Green
  (#76B900) — used as the brand's identity accent. Voice is
  technical, performance-led, and confident; visual treatment is
  black-and-green-on-white for marketing, with a black canvas
  variant for developer surfaces.

tags: [nvidia, hardware, gpu, ai, silicon, cuda, green, monochrome]

provenance:
  source: https://www.nvidia.com/en-us/about-nvidia/legal-info/logo-brand-usage/
  license: Proprietary — All Rights Reserved
  attribution: >
    NVIDIA Corporation — identity guidance captured from the public
    Logo and Brand Usage page at
    nvidia.com/en-us/about-nvidia/legal-info/logo-brand-usage/
    and palette values cross-referenced against the deployed
    stylesheet on nvidia.com. NVIDIA, the NVIDIA logo, the "eye"
    logomark, GeForce, CUDA, Omniverse, DRIVE, and Jetson are
    trademarks of NVIDIA Corporation.
  importedDate: 2026-05-18
  notes: >
    The proprietary brand typeface (NVIDIA Sans) is not publicly
    distributed. This atom references Inter@1 as the open-source
    rendering substitute and notes the proprietary primary here.
    Scope is parent corporate identity only — GeForce, CUDA,
    Omniverse, and other sub-brands are deferred to their own
    atoms. assets: [] per the encyclopedia's trademark-
    redistribution policy.

references:
  palette: nvidia@1
  fonts:
    heading: inter@1
    body: inter@1
    mono: jetbrainsmono-nerdfont@1

roles:
  colors:
    # NVIDIA is light-first; the brand block is the white canvas
    # with black text. Naming `identity` lets consumers render a
    # brand-badge surface in the corporate voice. The signature
    # green is the accent, not the identity surface — the logo
    # is monochrome, not green.
    identity: white
    on-identity: black

    primary: nvidia-green
    primary-hover: nvidia-green-dark
    accent: nvidia-green
    mark: black
    background-light: white
    background-dark: black
    surface-light: gray-50
    surface-dark: gray-700
    text-primary-light: black
    text-primary-dark: white
    text-secondary-light: gray-700
    text-tertiary-light: gray-600
    border-light: gray-100
  typography:
    display: heading
    prose: body
    code: mono

assets: []

rules:
  - type: colorChoice
    target: roles.colors.mark
    allowed:
      - black
      - white
    forbidden:
      - nvidia-green
      - nvidia-green-dark
      - gray-300
      - gray-600
      - gray-700
    severity: error
    rationale: >
      The Logo and Brand Usage page directs users to "use the full,
      two-color logo wherever possible," with one-color (black on
      light or white on dark) as the permitted alternative. The
      NVIDIA wordmark and "eye" logomark are not green — the
      signature green is the brand's accent color, not the mark
      fill. Filling the mark with NVIDIA Green is a forbidden
      recoloring.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - stretched
      - rotated
      - recolored
      - drop-shadow
      - gradient-fill
      - on-busy-photo
      - outlined
      - distorted
    severity: error
    rationale: >
      The published guidance prohibits distorting, modifying, or
      stylizing the logo, applying effects, or placing the mark
      on busy backgrounds. The mark must appear in its approved
      proportions and approved color treatments only.

  - type: contrastRatio
    target: logo
    against: background
    minRatio: 10.0
    severity: error
    rationale: >
      The Logo and Brand Usage page explicitly calls for "a minimum
      contrast ratio of 1:10 against the background" — stricter
      than the WCAG floor and applied specifically to the corporate
      mark to preserve legibility.

  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      Black (#000000) on the white (#FFFFFF) canvas gives ~21:1
      and clears WCAG AA at the body-text floor of 4.5:1. The
      monochrome brand posture leaves no headroom for lower-
      contrast text on the canvas surface.

  - type: colorChoice
    target: roles.colors.primary
    allowed:
      - nvidia-green
      - nvidia-green-dark
    forbidden:
      - black
      - white
      - gray-300
      - gray-600
    severity: error
    rationale: >
      NVIDIA Green (#76B900) is the brand's single chromatic
      accent and the only color permitted in the primary role.
      Neutrals are reserved for chrome and text. The darker green
      variant (#74B71B) is the on-dark legibility pairing
      declared in the live stylesheet.

  - type: contextRestriction
    target: roles.colors.primary
    forbiddenContexts:
      - body-text
      - long-form-reading
    severity: warning
    rationale: >
      NVIDIA Green is the brand accent — used on the wordmark,
      on calls-to-action, and as a highlight. It is not a body-
      text color; running paragraphs of NVIDIA Green type would
      fall below the AA contrast floor on the white canvas
      (#76B900 on #FFFFFF measures ~3.0:1, below the 4.5:1
      body-text minimum).

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AA
    criterion: "1.4.3"
    severity: error
    rationale: >
      WCAG 2.1 Success Criterion 1.4.3 (Contrast Minimum) — Level
      AA. The monochrome-with-green palette pairs naturally with
      AA: black on white and white on black both clear AAA, and
      the green accent is reserved for non-body roles where the
      AA-large 3:1 floor applies.

  - type: fontPairing
    target: typography.display
    requires: prose
    minSizeRatio: 1.3
    severity: recommendation
    rationale: >
      NVIDIA's marketing surfaces use NVIDIA Sans (proprietary)
      for both display and body, distinguished by size and weight
      rather than two distinct families. Maintain at least a 1.3×
      ratio between display and prose to preserve hierarchy when
      one family carries both roles.
