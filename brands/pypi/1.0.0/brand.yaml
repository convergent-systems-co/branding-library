id: pypi
version: 1.0.0
name: PyPI (Python Package Index)
description: >
  PyPI — the Python Package Index — is the official third-party
  software repository for the Python language and the default
  source from which `pip install <name>` resolves packages.
  PyPI is operated under the Python Software Foundation (PSF)
  and has its own USPTO-registered trademarks ("PyPI" and
  "Python Package Index") and a distinct "blocks logo" mark
  that is separate from the two-snake PSF / Python language
  identity. The voice is institutional and registry-direct:
  package pages, version histories, advisories, and the trust
  metadata that pip and other installers consume. Visually,
  PyPI shares the Python-family blue (#3775A9) and yellow
  (#FFD43B) anchors but expresses them through its own
  blocks-logo mark.

tags: [pypi, python, package-manager, psf, registry, brand, blue, yellow]

provenance:
  source: https://pypi.org/trademarks/
  license: Proprietary — All Rights Reserved
  attribution: >
    "PyPI", "Python Package Index", and the blocks logos are
    registered trademarks of the Python Software Foundation
    (USPTO #5608450; International #1384149 for "PyPI"; USPTO
    #5764496; International #1382296 for "Python Package
    Index"). Brand-atoms' encoding draws from the PyPI
    trademarks page (pypi.org/trademarks/), the PSF Trademark
    Usage Policy that governs the Python language mark, and
    the canonical PyPI Blue value (#3775A9) carried by the
    simple-icons project's "PyPI" entry.
  importedDate: 2026-05-19
  notes: >
    PyPI's trademarks page states verbatim: "'PyPI', 'Python
    Package Index', and the blocks logos are registered
    trademarks of the Python Software Foundation referring to
    products and services associated with pypi.org. Any other
    use by any other party is prohibited." Although PyPI
    inherits the Python-family blue/yellow palette, the PyPI
    blocks-logo mark is distinct from the PSF two-snake mark
    and has its own registration — substituting one for the
    other crosses the boundary between two distinct registered
    marks of the Foundation. The Python language brand is
    encoded separately in the sibling `python@1` atom.

references:
  palette: pypi@1
  fonts:
    heading: inter@1
    body: inter@1
    mono: source-code-pro@1

roles:
  colors:
    identity: pypi-blue
    on-identity: pypi-white
    primary: pypi-blue
    primary-hover: pypi-blue-dark
    accent: pypi-yellow
    accent-hover: pypi-yellow-dark
    mark: pypi-blue
    background: pypi-white
    surface: pypi-off-white
    text-primary: pypi-blue-dark
    text-secondary: pypi-slate
    error: pypi-error
    success: pypi-blue
    border: pypi-light-gray
  typography:
    display: heading
    prose: body
    code: mono

assets: []

rules:
  - type: colorChoice
    target: roles.colors.identity
    allowed:
      - pypi-blue
      - pypi-yellow
    forbidden:
      - pypi-slate
      - pypi-gray
      - pypi-error
    severity: error
    rationale: >
      The PyPI blocks-logo mark and the Python-family identity
      it inherits are anchored on the blue + yellow pairing.
      Substituting slate, gray, or red for the identity color
      breaks the registered-mark expression and conflicts with
      the PSF Trademark Usage Policy's reproduction
      requirements.

  - type: contextRestriction
    target: trademark.use
    forbiddenContexts:
      - implied-endorsement
      - generic-name-for-any-package-registry
      - product-name-prefix-without-approval
      - paid-merchandise-without-approval
      - blocks-logo-substituted-for-snakes-logo
      - snakes-logo-substituted-for-blocks-logo
    severity: error
    rationale: >
      Per pypi.org/trademarks/: "Any other use by any other
      party is prohibited." Use of "PyPI" as a generic synonym
      for a package registry, as a product-name prefix without
      PSF approval, on paid merchandise without PSF approval,
      or substituting the PSF two-snake logo for the PyPI
      blocks logo (or vice versa) all cross policy lines —
      the two marks have separate registrations and signify
      different things.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - recolored
      - rotated
      - skewed
      - stretched
      - derived-without-approval
      - drop-shadow
      - blocks-recombined
      - blocks-color-mixed
    severity: error
    rationale: >
      The PSF Trademark Usage Policy requires that Foundation
      logos be reproduced "with the right colors and fonts"
      and that derived versions require PSF approval before
      use. The PyPI blocks logo is defined by the specific
      arrangement and color assignment of its blocks;
      recombining the blocks, mixing the colors across
      blocks, recoloring, or rotation violates the policy.

  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      PyPI Blue Dark (#1E415E) on PyPI White exceeds 9:1 —
      well above the WCAG AA threshold for body text on the
      registry's package pages and version histories.

  - type: contrastRatio
    target: roles.colors.accent
    against: background
    minRatio: 3.0
    standard: WCAG-AA-large
    severity: warning
    rationale: >
      PyPI Yellow (#FFD43B) on White sits around 1.5:1 — does
      NOT clear WCAG AA or AA-large for text. Reserve the
      yellow for large surfaces, callout backgrounds with dark
      text on top, the mark itself, and accent illustration;
      use PyPI Blue or PyPI Blue Dark for any interactive or
      text-bearing foreground.

  - type: fontPairing
    target: typography.heading
    requires: body
    minSizeRatio: 1.5
    severity: recommendation
    rationale: >
      pypi.org uses a single humanist sans across heading and
      body. Maintain at least a 1.5× heading-to-body ratio on
      package detail pages, search results, and release
      history listings.

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AA
    criterion: "1.4.3"
    severity: error
    rationale: >
      WCAG 2.1 Success Criterion 1.4.3 (Contrast Minimum) —
      Level AA. PyPI is the registry of record for the Python
      ecosystem; broad legibility is a load-bearing
      requirement.

  - type: compositionConstraint
    target: roles.colors.identity
    pairsWith:
      - pypi-white
      - pypi-off-white
      - pypi-yellow
      - pypi-blue-dark
    doesNotPairWith:
      - pypi-error
    severity: recommendation
    rationale: >
      PyPI Blue pairs cleanly with the white canvas, the
      Python-family yellow, and its own deeper navy. Placing
      it directly adjacent to PyPI Error Red mixes
      registered-mark identity with status semantics and
      flattens the brand's institutional voice — reserve
      error red for advisories and yanked-release callouts.
