id: intel
version: 1.0.0
name: Intel
description: >
  Intel Corporation is the silicon company behind the Core, Xeon,
  and Arc lines and the modern Intel Foundry business. The 2020
  brand refresh replaced Intel's long-running "swoosh" identity
  with a flat, geometric wordmark in Intel Classic Blue (#0068B5),
  paired with a bright Intel Energy Blue (#00C7FD) for highlights
  and active states. The voice on intel.com is technical and
  enterprise-leaning; the visual treatment is light-first with a
  near-white canvas, carbon greys for surfaces and text, and the
  two blues carrying primary action and accent roles.

tags: [intel, hardware, cpu, silicon, semiconductor, blue, enterprise]

provenance:
  source: https://www.intel.com/
  license: Proprietary — All Rights Reserved
  attribution: >
    Intel Corporation — identity values captured from the deployed
    stylesheet on intel.com (clientlib-base.min.css and
    intel-fonts.css under the --ighf-h-color-* / Intel One font-
    family declarations). Intel, the Intel logo, Intel Core,
    Intel Xeon, Intel Arc, Intel Foundry, Intel One, and Intel
    Clear are trademarks of Intel Corporation.
  importedDate: 2026-05-18
  notes: >
    Derived from live site CSS at https://www.intel.com/ on
    2026-05-18; published brand guide at
    intel.com/content/www/us/en/company-overview/brand-guidelines.html
    is unavailable (returns 404 to non-browser clients). The
    proprietary brand typeface family (Intel One, Intel Clear)
    is declared on intel.com but not publicly distributed.
    This atom references Inter@1 as the open-source rendering
    substitute. Scope is the parent corporate identity only —
    Core, Xeon, Arc, and Foundry sub-brands are deferred. assets:
    [] per the encyclopedia's trademark-redistribution policy.

references:
  palette: intel@1
  fonts:
    heading: inter@1
    body: inter@1
    mono: jetbrainsmono-nerdfont@1

roles:
  colors:
    # Intel is light-first; the brand block is the white canvas
    # with Classic Blue as the primary action color and carbon-
    # 800 as the body text. Naming `identity` lets consumers
    # render brand-badge surfaces in the corporate voice.
    identity: white
    on-identity: carbon-800

    primary: classic-blue
    primary-hover: blue-700
    accent: energy-blue
    accent-hover: classic-blue
    mark: classic-blue
    background-light: white
    background-dark: blue-900
    surface-light: carbon-web
    surface-dark: carbon-800
    text-primary-light: carbon-800
    text-primary-dark: white
    text-secondary-light: carbon-600
    text-tertiary-light: carbon-500
    border-light: carbon-200
  typography:
    display: heading
    prose: body
    code: mono

assets: []

rules:
  - type: colorChoice
    target: roles.colors.mark
    allowed:
      - classic-blue
      - black
      - white
    forbidden:
      - energy-blue
      - blue-700
      - blue-800
      - carbon-400
      - carbon-600
    severity: error
    rationale: >
      The 2020 wordmark fills with Intel Classic Blue (#0068B5)
      on light surfaces, or with monochrome black-on-light /
      white-on-dark when a one-color treatment is required.
      Energy Blue is the accent — used as a highlight color
      alongside the mark, never as the mark fill itself.

  - type: forbiddenTreatment
    target: logo
    treatments:
      - stretched
      - rotated
      - recolored
      - drop-shadow
      - gradient-fill
      - on-busy-photo
      - outlined
    severity: error
    rationale: >
      The Intel mark is a fixed-proportion geometric wordmark.
      Recoloring (e.g., filling with Energy Blue or with a
      carbon grey), skewing, gradient-filling, drop-shadowing,
      or placing the mark on a busy photo conflicts with the
      restrained 2020 identity as it appears on intel.com.

  - type: contrastRatio
    target: text-primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      Carbon 800 (#262626) on white (#FFFFFF) measures ~14:1 —
      clears WCAG AA at the body-text floor of 4.5:1 with
      meaningful headroom. The enterprise reading posture on
      intel.com justifies the AA target as a hard floor.

  - type: contrastRatio
    target: roles.colors.primary
    against: background
    minRatio: 4.5
    standard: WCAG-AA
    severity: error
    rationale: >
      Classic Blue (#0068B5) on white measures ~5.6:1 — clears
      WCAG AA for body text, important because intel.com uses
      Classic Blue for inline links inside paragraph text where
      the 4.5:1 body-text floor (not the 3:1 large-text floor)
      applies.

  - type: contextRestriction
    target: roles.colors.accent
    allowedContexts:
      - highlight
      - active-state
      - data-viz
      - hover-affordance
    forbiddenContexts:
      - body-text
      - long-form-reading
    severity: warning
    rationale: >
      Energy Blue (#00C7FD) is the bright accent introduced in
      the 2020 refresh. It functions at highlight and active-
      state scales but falls below the AA body-text contrast
      floor on the white canvas (~2.1:1) and must not be used
      for running text.

  - type: colorChoice
    target: roles.colors.primary
    allowed:
      - classic-blue
      - blue-700
      - energy-blue
    forbidden:
      - blue-800
      - blue-900
      - carbon-800
    severity: error
    rationale: >
      The identity-primary role is filled by Classic Blue
      (default) or Energy Blue (on dark surfaces, where Classic
      Blue loses contrast). The deeper saturated blues
      (#0046C8, #000F28) are hero-canvas colors, not action
      colors — using them as the primary affordance breaks the
      established 2020 hierarchy.

  - type: accessibilityRequirement
    target: "*"
    standard: WCAG-AA
    criterion: "1.4.3"
    severity: error
    rationale: >
      WCAG 2.1 Success Criterion 1.4.3 (Contrast Minimum) — Level
      AA. The carbon-on-white text pairings and Classic Blue
      links all clear AA at the body-text floor. AA is the
      appropriate target for an enterprise marketing surface
      with mixed-density information.

  - type: fontPairing
    target: typography.display
    requires: prose
    minSizeRatio: 1.3
    severity: recommendation
    rationale: >
      Intel's marketing surfaces use Intel One Body Text
      (proprietary) for both display and body, distinguished by
      size and weight rather than two families. Maintain at
      least a 1.3× ratio between display and prose to preserve
      hierarchy when one family carries both roles.
